    /* --- LOCKDOWN OVERLAY --- */
    #lockdown-overlay {
        font-family: "New Rocker", system-ui;
        font-size: 25px;
        color: #000; 
        position: fixed; 
        inset: 0; 
        z-index: 1000000;
        /* Startowe tło */
        background: radial-gradient(circle at center, #111 0%, #000 100%);
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);

        /* Wywołanie płynnej animacji (8s dla spokoju, ease-in-out dla płynności) */
        animation: lockdown-pulse 4s ease-in-out infinite alternate;
    }

    /* Połączona animacja tła i neonu */
    @keyframes lockdown-pulse {
        0% {
            opacity: 1;
            /* Ciemniejsze, bardziej sterylne tło */
            background-color: #000;
            text-shadow: 
                0 0 5px #000,
                0 0 7px #000,
                0 0 10px #111,
                 0 0 7px #000,
                0 0 10px #111,
                 0 0 7px #000,
                0 0 10px #111,
                0 0 15px #000;
        }
        25% {
            opacity: 1;
          
        }
        50% {
			 background-color: #000;
            opacity: 1;
            
        }
             60% {
				  background-color: #000;
            opacity: 1;
		}
        100% {
            opacity: 0.9;
            /* Rozjaśnione tło - efekt poświaty "ambient" */
            background-color: #000;
            text-shadow: 
                0 0 2px #1,
                0 0 5px #fff,
                0 0 7px #555,
                0 0 10px #fff,
                0 0 15px #999;
        }
    }

/* === CZERWONY X (bez tła) === */
.ctrl-close {
    background: transparent;
}

/* linie X */
.ctrl-close::before,
.ctrl-close::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 14px;
    height: 4px;
    background: #ff5f57;
    transform-origin: center;
}

.ctrl-close::before {
    transform: translate(-50%, -50%) rotate(45deg);
}

.ctrl-close::after {
    transform: translate(-50%, -50%) rotate(-45deg);
}

       installApp: (name, iconUrl, appUrl) => {
    const newId = Date.now();
    if (!ICON_MAP[name]) ICON_MAP[name] = iconUrl;

    // Rozmiary per aplikacja
    const sizeMap = {
        'Master Chat': 'K',
        'GPS':         'SMALL',
        'Funkcje Natywne':   'P',
    };
    const size = sizeMap[name] || 'MEDIUM';

    const posMap = {
       'Master Chat': { x: 310,  y: 10  },
        'GPS':         { x: 210, y: 210 },
        'Funkcje Natywne':   { x: 210, y: 310  },
    };
    const pos = posMap[name] || { x: 310, y: 410 };

    MasterCore.state.icons.push({
        id: newId, name: name, app: name, x: pos.x, y: pos.y,
        size: size, customUrl: appUrl
    });
                MasterCore.save();
                MasterCore.renderDesktop();
                MasterStart.init();
                MasterDialog.alert("Master Store", `Aplikacja ${name} została zainstalowana.`);

            renderDesktop: () => {
                const pc = document.getElementById('master-pc');
                pc.querySelectorAll('.icon').forEach(i => i.remove());
                MasterCore.state.icons.forEach(data => {
                    const div = MasterCore.createIconElement(data, 'shortcut');
                    pc.appendChild(div);
                });
                const systemFolders = ['Dokumenty', 'Pobrane', 'Obrazy'];
                MasterCore.state.fs.forEach(item => {
                    if (systemFolders.includes(item.name) && item.type === 'dir') return;
                    const div = MasterCore.createIconElement(item, 'fs-item');
                    if(!div.style.left || div.style.left === '30px') { 
                        div.style.left = '230px'; 
                        div.style.top = (30 + (MasterCore.state.fs.indexOf(item)*100)) + 'px'; 
                    }
                    pc.appendChild(div);
                });
            },

            createIconElement: (data, type) => {
                const div = document.createElement('div');
                div.className = 'icon';
                div.style.left = (data.x || 30) + 'px'; div.style.top = (data.y || 30) + 'px';
                div.dataset.id = data.id;
                div.dataset.type = type;

                // Dynamiczne dobieranie ikony na podstawie typu i rozszerzenia
                let iconImg;
                if (type === 'shortcut') {
                    iconImg = ICON_MAP[data.app] || ICON_MAP['File'];
                } else {
                    iconImg = MasterCore.getFileIcon(data.name, data.type);
                }

                div.innerHTML = `
                    <div class="icon-img">
                        <img src="${iconImg}" class="sys-img-icon" alt="${data.name}">
                    </div>
                    <div class="icon-txt">${data.name}</div>`;
                div.onpointerdown = (e) => MasterCore.handleIconDrag(e, div, data);
                div.ondblclick = () => {
                    if(type === 'shortcut') {
                        if(data.app === 'Trash') MasterWindow.launch('Trash', 'Kosz', '', 'SMALL');
                        else MasterWindow.launch(data.app, data.name, data.customUrl || '', data.size);
                    }
                    else if(data.type === 'dir') MasterWindow.launch('Explorer', data.name, '', 'MEDIUM');
                    else MasterApp.openFile(data.name, data.content);
                };
                return div;
            },

            selectedIcons: new Set(),

            bindEvents: () => {
                const pc = document.getElementById('master-pc');
                const marquee = document.getElementById('marquee');
                let sx, sy;

                pc.onpointerdown = (e) => {
                    if (e.target !== pc) return;
                    MasterCore.selectedIcons.forEach(i => i.classList.remove('selected'));
                    MasterCore.selectedIcons.clear();
                    sx = e.clientX; sy = e.clientY;
                    marquee.style.display = 'block';
                    marquee.style.left = sx+'px'; marquee.style.top = sy+'px';
                    marquee.style.width = '0'; marquee.style.height = '0';

                    const move = (m) => {
                        let nx = Math.min(sx, m.clientX), ny = Math.min(sy, m.clientY);
                        let nw = Math.abs(sx - m.clientX), nh = Math.abs(sy - m.clientY);
                        marquee.style.left = nx+'px'; marquee.style.top = ny+'px';
                        marquee.style.width = nw+'px'; marquee.style.height = nh+'px';
                        document.querySelectorAll('#master-pc > .icon').forEach(i => {
                            const r = i.getBoundingClientRect();
                            if (r.left < nx+nw && r.right > nx && r.top < ny+nh && r.bottom > ny) {
                                i.classList.add('selected'); MasterCore.selectedIcons.add(i);
                            } else { i.classList.remove('selected'); MasterCore.selectedIcons.delete(i); }
                        });
                    };
                    const up = () => { marquee.style.display = 'none'; document.removeEventListener('pointermove', move); document.removeEventListener('pointerup', up); };
                    document.addEventListener('pointermove', move); document.addEventListener('pointerup', up);
                };

                pc.ondragover = (e) => e.preventDefault();
                pc.ondrop = (e) => {
                    e.preventDefault();
                    Array.from(e.dataTransfer.files).forEach(f => {
                        const r = new FileReader();
                        r.onload = (ev) => {
                            // Rozpoznawanie czy plik to obraz na podstawie MIME
                            const isImg = f.type.startsWith('image/');
                            MasterCore.state.fs.push({ 
                                id: Date.now(), 
                                name: f.name, 
                                type: isImg ? 'image' : 'file', 
                                content: ev.target.result, 
                                x: e.clientX, 
                                y: e.clientY 
                            });
                            MasterCore.save();
                            MasterCore.renderDesktop();
                        };
                        if(f.type.startsWith('image/')) r.readAsDataURL(f);
                        else r.readAsText(f);
                    });
                };
            },

            handleIconDrag: (e, el, data) => {
                e.stopPropagation();
                if(!MasterCore.selectedIcons.has(el)) {
                    MasterCore.selectedIcons.forEach(i => i.classList.remove('selected'));
                    MasterCore.selectedIcons.clear();
                    el.classList.add('selected');
                    MasterCore.selectedIcons.add(el);
                }
                let startX = e.clientX, startY = e.clientY;
                let initial = new Map();
                MasterCore.selectedIcons.forEach(i => initial.set(i, {x: i.offsetLeft, y: i.offsetTop}));
                
                let currentHoveredFolder = null;

                const move = (m) => {
                    let dx = m.clientX - startX, dy = m.clientY - startY;
                    MasterCore.selectedIcons.forEach(i => {
                        let p = initial.get(i);
                        i.style.left = (p.x + dx)+'px';
                        i.style.top = (p.y + dy)+'px';
                    });

                    // Szukanie folderu pod kursorem (przenoszenie na inny folder)
                    if (currentHoveredFolder) {
                        currentHoveredFolder.classList.remove('drop-target');
                        currentHoveredFolder = null;
                    }

                    // Znajdź wszystkie elementy pod punktem kursora
                    const elementsUnder = document.elementsFromPoint(m.clientX, m.clientY);
                    for (const targetEl of elementsUnder) {
                        const icon = targetEl.closest('.icon');
                        // Sprawdź czy to ikona, czy nie jest przeciągana i czy jest folderem
                        if (icon && !MasterCore.selectedIcons.has(icon)) {
                            const targetId = icon.dataset.id;
                            const targetItem = MasterCore.getDeepFsItem(targetId);
                            if (targetItem && targetItem.type === 'dir') {
                                currentHoveredFolder = icon;
                                currentHoveredFolder.classList.add('drop-target');
                                break;
                            }
                        }
                    }
                };

                const up = (m) => {
                    if (currentHoveredFolder) {
                        const targetFolderId = currentHoveredFolder.dataset.id;
                        const targetFolder = MasterCore.getDeepFsItem(targetFolderId);
                        
                        MasterCore.selectedIcons.forEach(i => {
                            const sid = i.dataset.id;
                            // Szukaj w ikonach (skrótach) lub w systemie plików
                            let itemToMove = null;
                            const isShortcut = i.dataset.type === 'shortcut';
                            
                            if (isShortcut) {
                                const idx = MasterCore.state.icons.findIndex(si => si.id == sid);
                                if (idx > -1) itemToMove = MasterCore.state.icons.splice(idx, 1)[0];
                            } else {
                                itemToMove = MasterCore.getDeepFsItem(sid, true); // true = usuń z poprzedniego miejsca
                            }

                            if (itemToMove && targetFolder) {
                                if (!targetFolder.children) targetFolder.children = [];
                                // Jeśli przenosimy skrót, oznaczamy go jako element fs o typie 'shortcut'
                                if (isShortcut) itemToMove.type = 'shortcut';
                                targetFolder.children.push(itemToMove);
                            }
                        });

                        currentHoveredFolder.classList.remove('drop-target');
                        MasterCore.save();
                        MasterCore.renderDesktop();
                        // Odśwież okna eksploratora jeśli są otwarte
                        MasterWindow.active.forEach((v, k) => { if(v.app === 'Explorer') MasterApp.renderExplorer(k); });
                    } else {
                        // Zwykłe przesunięcie na pulpicie
                        MasterCore.selectedIcons.forEach(i => {
                            const sid = parseFloat(i.dataset.id);
                            let target = MasterCore.state.icons.find(si => si.id === sid);
                            if(!target) target = MasterCore.state.fs.find(si => si.id === sid);
                            if(target) {
                                target.x = i.offsetLeft;
                                target.y = i.offsetTop;
                            }
                        });
                        MasterCore.save();
                    }

                    document.removeEventListener('pointermove', move);
                    document.removeEventListener('pointerup', up);
                };
                document.addEventListener('pointermove', move);
                document.addEventListener('pointerup', up);
            },

            startClock: () => {
                const tick = () => {
                    const now = new Date();
                    document.getElementById('tray-time').innerText = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    document.getElementById('tray-date').innerText = now.toLocaleDateString();
                    const tc = document.getElementById('time-center');
                    if (tc.style.display === 'flex') {
                        document.getElementById('tc-big-clock').innerText = now.toLocaleTimeString();
                        document.getElementById('tc-big-date').innerText = now.toLocaleDateString('pl-PL', { weekday: 'long', day: 'numeric', month: 'long' });
                    }
                };
                setInterval(tick, 1000);
                tick();
            }
        };
            /* ------------------------------------------------------------- PART 2: WINDOW MANAGER ----------------------------------------------------------------------------------------- */
            const MasterWindow = {
                active: new Map(),
                z: 1000,

                getSizes: (sizeId) => {
                    const sw = window.innerWidth, sh = window.innerHeight;
                    const isMob = sw < 768;
                    const config = {
                        /* --- Rozmiary oryginalne --- */
                        'SMALL':   { w: isMob ? sw * 0.85 : 380,       h: isMob ? sh * 0.5  : 300        },
                        'S':       { w: isMob ? sw * 0.85 : 240,       h: isMob ? sh * 0.5  : 200        },
                        'MEDIUM':  { w: isMob ? sw * 0.92 : sw * 0.6,  h: isMob ? sh * 0.7  : sh * 0.6  },
                        'LARGE':   { w: isMob ? sw * 0.96 : sw * 0.85, h: isMob ? sh * 0.85 : sh * 0.8  },
                        'L':       { w: isMob ? sw * 0.90 : 440,       h: isMob ? sh * 0.7  : sh * 0.9  },
                        'K':       { w: isMob ? sw * 0.85 : 380,       h: isMob ? sh * 0.5  : sh * 0.5  },
                        'P':       { w: isMob ? sw * 0.85 : 380,       h: isMob ? sh * 0.7  : sh * 0.8  },

                        /* --- Nowe rozmiary --- */

                        /* Miniaturka — mała kwadratowa kartka, np. do kalkulatora / notatki */
                        '1': { w: isMob ? sw * 0.75 : 300,       h: isMob ? sh * 0.4  : 250        },

                        /* Szeroki pasek — np. odtwarzacz mediów, pasek kontrolny */
                        '2':    { w: isMob ? sw * 0.98 : sw * 0.82, h: isMob ? sh * 0.38 : sh * 0.38 },

                        /* Wysoki wąski — np. sidebar z narzędziami */
                        '3':    { w: isMob ? sw * 0.70 : 340,       h: isMob ? sh * 0.88 : sh * 0.85 },

                        /* Sidebar — wąski, pełna wysokość (minus pasek zadań) */
                        '4': { w: isMob ? sw * 0.60 : 280,       h: sh - 47                        },

                        /* Prawie pełny ekran — duże okno z widocznym pulpitem za nim */
                        '5':  { w: isMob ? sw * 0.99 : sw * 0.95, h: isMob ? sh * 0.95 : sh * 0.92 },

                        /* MAX — placeholder; launch() od razu dodaje klasę .maximized */
                        '6':     { w: sw * 0.95, h: sh * 0.92 }
                    };
                    return config[sizeId] || config['MEDIUM'];
                },

                launch: (app, title, data = '', sizeId = 'MEDIUM') => {
                    const id = 'win' + Date.now();
                    const dims = MasterWindow.getSizes(sizeId);
                    const w = document.createElement('div');
                    w.className = 'window'; w.id = id; w.style.zIndex = ++MasterWindow.z;
                    w.style.width = dims.w + 'px'; w.style.height = dims.h + 'px';
                    w.style.left = ((window.innerWidth - dims.w) / 2 + (MasterWindow.active.size * 25)) + 'px';
                    w.style.top = ((window.innerHeight - dims.h - 60) / 2 + (MasterWindow.active.size * 25)) + 'px';

                    w.innerHTML = `
                        <div class="win-head" onpointerdown="MasterWindow.focus('${id}')">
                            <div class="win-title">
                                <img src="${ICON_MAP[app] || ICON_MAP['File']}" class="win-icon-sm" alt="App">
                                ${title}
                            </div>
                            <div class="win-ctrls">
                                <button class="ctrl-btn ctrl-min" onclick="MasterWindow.minimize('${id}')"></button>
                                <button class="ctrl-btn ctrl-max" onclick="MasterWindow.maximize('${id}')"></button>
                                <button class="ctrl-btn ctrl-close" onclick="MasterWindow.close('${id}')"></button>
                            </div>
                        </div>
                        <div class="win-body" id="body-${id}"></div>
                        <div class="resizer"></div>
                    `;

                    document.getElementById('master-pc').appendChild(w);
                    MasterWindow.active.set(id, { el: w, app, title });
                    MasterWindow.makeDraggable(w, id);
                    MasterWindow.makeResizable(w);
                    MasterApp.render(id, app, data);

                    /* Jeśli rozmiar to MAX — od razu maksymalizuj bez animacji */
                    if (sizeId === 'MAX') {
                        w.classList.add('maximized');
                    }

                    MasterWindow.syncTaskbar();
                    document.getElementById('start-menu').style.display = 'none';
                    return w;
                },

                focus: (id) => { 
                    const w = document.getElementById(id); 
                    if(w) { 
                        w.style.zIndex = ++MasterWindow.z; 
                        w.style.display = 'flex';
                        w.classList.remove('anim-close','anim-minimize','anim-maximize','anim-restore');
                        void w.offsetWidth;
                        w.classList.add('anim-restore');
                        MasterWindow.syncTaskbar(); 
                    } 
                },
                minimize: (id) => {
                    const w = document.getElementById(id);
                    if(!w) return;
                    w.classList.remove('anim-close','anim-minimize','anim-maximize','anim-restore');
                    void w.offsetWidth;
                    w.classList.add('anim-minimize');
                    setTimeout(() => { w.style.display = 'none'; w.classList.remove('anim-minimize'); MasterWindow.syncTaskbar(); }, 220);
                },
                maximize: (id) => {
                    const w = document.getElementById(id);
                    if(!w) return;
                    w.classList.remove('anim-close','anim-minimize','anim-maximize','anim-restore');
                    void w.offsetWidth;
                    w.classList.toggle('maximized');
                    w.classList.add('anim-maximize');
                    setTimeout(() => w.classList.remove('anim-maximize'), 350);
                },
                close: (id) => {
                    const w = document.getElementById(id);
                    if(!w) return;
                    w.classList.remove('anim-minimize','anim-maximize','anim-restore');
                    void w.offsetWidth;
                    w.classList.add('anim-close');
                    setTimeout(() => { w.remove(); MasterWindow.active.delete(id); MasterWindow.syncTaskbar(); }, 280);
                },

                syncTaskbar: () => {
                    const list = document.getElementById('task-list'); list.innerHTML = '';
                    MasterWindow.active.forEach((v, k) => {
                        const tab = document.createElement('div');
                        tab.className = 'task-tab' + (v.el.style.display !== 'none' ? ' active' : '');
                        tab.innerHTML = `<img src="${ICON_MAP[v.app] || ICON_MAP['File']}" alt="Task">`;
                        tab.onclick = () => v.el.style.display === 'none' ? MasterWindow.focus(k) : MasterWindow.minimize(k);
                        list.appendChild(tab);
                    });
                },

                makeDraggable: (w, id) => {
                    const h = w.querySelector('.win-head');
                    h.onpointerdown = (e) => {
                        if(w.classList.contains('maximized')) return;
                        MasterWindow.focus(id);
                        let ox = e.clientX - w.offsetLeft, oy = e.clientY - w.offsetTop;
                        const m = (ev) => { w.style.left = (ev.clientX - ox)+'px'; w.style.top = (ev.clientY - oy)+'px'; };
                        const u = () => { document.removeEventListener('pointermove', m); document.removeEventListener('pointerup', u); };
                        document.addEventListener('pointermove', m); document.addEventListener('pointerup', u);
                    };
                },

                makeResizable: (w) => {
                    const r = w.querySelector('.resizer');
                    r.onpointerdown = (e) => {
                        e.stopPropagation();
                        let sx = e.clientX, sy = e.clientY, sw = w.offsetWidth, sh = w.offsetHeight;
                        const m = (ev) => { w.style.width = (sw + (ev.clientX - sx))+'px'; w.style.height = (sh + (ev.clientY - sy))+'px'; };
                        const u = () => { document.removeEventListener('pointermove', m); document.removeEventListener('pointerup', u); };
                        document.addEventListener('pointermove', m); document.addEventListener('pointerup', u);
                    };
                }
            };

                                    <button class="calc-btn eq" onclick="MasterApp.calcAction('${wid}', '=')">=</button>
                                </div>
                            </div>`;
                        // Inicjalizacja stanu kalkulatora dla okna

                    /* Kolor akcentu i tryb */

                    const angEl = document.getElementById('s-grad-angle');

                    if (ac2El) st.accent2 = ac2El.value;
                    if (angEl) st.accentAngle = angEl.value;
                    /* accentType zapisywany przez setAccentMode / liveAccent */

                    /* Przezroczystości (suwaki w zakładce Przezroczystość) */
                    const readSlider = (id, stKey, def) => {

                        else if (st[stKey] === undefined) st[stKey] = def;

                    readSlider('calc',    'opCalc',    0.8);
                    readSlider('time',    'opTime',    0.8);

                    /* --- ZASTOSOWANIE USTAWIEŃ DO SYSTEMU --- */

                    MasterCore.save();

                /* Funkcja wewnętrzna: aplikuje WSZYSTKIE ustawienia do CSS variables */
                _applyAllSettings: () => {
                    const st = MasterCore.state.settings;

                    /* == AKCENT == */
                    const c1 = st.accent || '#000000';
                    const c2 = st.accent2 || '#000000';
                    const ang = st.accentAngle || '90deg';
                    const isGrad = (st.accentType === 'gradient');

                    document.documentElement.style.setProperty('--accent', c1);
                    document.documentElement.style.setProperty('--accent2', c2);
                    /* --accent-bg to wartość używana jako tło elementów z akcentem (start-btn, cal-day.current, przyciski) */
                    if (isGrad) {
                        document.documentElement.style.setProperty('--accent-bg', `linear-gradient(${ang}, ${c1}, ${c2})`);
                    } else {
                        document.documentElement.style.setProperty('--accent-bg', c1);
                    }

                    /* == TAPETA == */
                    if (st.wallpaper) {
                        document.getElementById('master-pc').style.backgroundImage = `url(${st.wallpaper})`;
                    }

                    /* == PRZEZROCZYSTOŚCI == */
                    /* Pomocnik: konwertuje wartość suwaka (0-1) na rgba z pożądanym kanałem alpha */
                    const toRGBA = (val, r, g, b) => `rgba(${r},${g},${b},${val})`;

                    const opWin     = st.opWin     !== undefined ? st.opWin     : 0.8;
                    const opTaskbar = st.opTaskbar !== undefined ? st.opTaskbar : 0.8;
                    const opMenu    = st.opMenu    !== undefined ? st.opMenu    : 0.8;
                    const opWidget  = st.opWidget  !== undefined ? st.opWidget  : 0.68;
                    const opCalc    = st.opCalc    !== undefined ? st.opCalc    : 0.8;
                    const opTime    = st.opTime    !== undefined ? st.opTime    : 0.8;

                    /* Okna systemowe — ciemne (17,17,17) */
                    document.documentElement.style.setProperty('--win-bg',     toRGBA(opWin,     17, 17, 17));
                    /* Pasek zadań — ciemny */
                    document.documentElement.style.setProperty('--taskbar-bg', toRGBA(opTaskbar, 17, 17, 17));
                    /* Menu start i podmenu*/
                    document.documentElement.style.setProperty('--menu-bg',    toRGBA(opMenu,    20, 20, 20));
                    /* Widgety pulpitu — prawie czarne */
                    document.documentElement.style.setProperty('--widget-bg',  toRGBA(opWidget,  8,  8,  8));
                    /* Kalkulator — tło okna (identyczne jak okna, ale osobna kontrola) */
                    document.documentElement.style.setProperty('--calc-bg',    toRGBA(opCalc,    17, 17, 17));
                    /* Kalendarz / panel czasu */
                    document.documentElement.style.setProperty('--time-bg',    toRGBA(opTime,    17, 17, 17));

                    const pct = Math.round(parseFloat(val) * 100);
                    const labelEl = document.getElementById('sv-' + id);
                    if (labelEl) labelEl.textContent = pct + '%';

                    /* Natychmiast aplikuj tylko tę jedną zmienną live */
                    const st = MasterCore.state.settings;
                    st[stKey] = parseFloat(val);
                    MasterApp._applyAllSettings();

                    const btnSolid = document.getElementById('smb-solid');
                    const btnGrad  = document.getElementById('smb-gradient');
                    if (btnSolid) btnSolid.classList.toggle('active', mode === 'solid');
                    if (btnGrad)  btnGrad.classList.toggle('active',  mode === 'gradient');
                    /* Pokaż/ukryj kontrolki gradientu */
                    const extra = document.getElementById('s-grad-extra');
                    const dir   = document.getElementById('s-grad-dir');

                    const c1  = ac1El  ? ac1El.value  : (MasterCore.state.settings.accent  || '#000000');

                    /* Aktualizuj swatche */
                    if (sw1) sw1.style.background = c1;
                    if (sw2) sw2.style.background = c2;

                renderCalendar: () => {
                    const grid = document.getElementById('cal-grid');
                    const now = new Date();
                    const month = now.getMonth();
                    const year = now.getFullYear();
                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();
                    const names = ['PN', 'WT', 'ŚR', 'CZ', 'PT', 'SO', 'ND'];
                    let html = names.map(n => `<div class="cal-day-name">${n}</div>`).join('');
                    let offset = (firstDay === 0) ? 6 : firstDay - 1;
                    for(let i = 0; i < offset; i++) html += `<div class="cal-day other"></div>`;
                    for(let d = 1; d <= daysInMonth; d++) {
                        const isToday = (d === now.getDate()) ? 'current' : '';

                    grid.innerHTML = html;

                    MasterCtx.hide();

                    if(item) {
                        MasterCore.state.clipboard = JSON.parse(JSON.stringify(item));
                        /* Zapamiętaj typ źródłowy i że to kopia (nie przeniesienie) */

                paste: (mode, wid) => {
                    MasterCtx.hide();
                    if(!MasterCore.state.clipboard) return;

                    const cb       = MasterCore.state.clipboard;
                    const isMove   = cb._clipMove;
                    const origId   = cb._clipOrigId;
                    const origType = cb._clipType;

                    /* Zrób czystą kopię bez wewnętrznych flag schowka */
                    const item = JSON.parse(JSON.stringify(cb));
                    delete item._clipType; delete item._clipMove; delete item._clipOrigId;

                    /* Przy kopiowaniu nadaj nowe id i dodaj "_kopia" do nazwy */
                    if(!isMove) {
                        item.id   = Date.now();
                        item.name += '_kopia';
                    }
                    item.x = (item.x || 0) + 20;
                    item.y = (item.y || 0) + 20;

                    if(origType === 'shortcut') {
                        /* Skróty aplikacji — operujemy na state.icons */
                        if(isMove) {
                            /* Usuń oryginał z listy ikon */
                            MasterCore.state.icons = MasterCore.state.icons.filter(i => i.id != origId);
                        }
                        MasterCore.state.icons.push(item);
                    } else {
                        /* Pliki / foldery VFS — usuń oryginał przy przenoszeniu */
                        if(isMove) MasterCore.getDeepFsItem(origId, true);

                        if(mode === 'desktop') {
                            MasterCore.state.fs.push(item);
                        } else {
                            /* Wklej do aktualnego katalogu w eksploratorze */
                            const path = MasterApp.paths.get(wid) || [];
                            let dir = MasterCore.state.fs;
                            path.forEach(p => { const f = dir.find(i => i.name === p && i.type === 'dir'); if(f) dir = f.children; });
                            dir.push(item);
                        }
                    }

                    /* Po przeniesieniu wyczyść schowek */
                    if(isMove) MasterCore.state.clipboard = null;

                    MasterCore.save(); MasterCore.renderDesktop();
                    MasterWindow.active.forEach((v,k) => { if(v.app==='Explorer') MasterApp.renderExplorer(k); });

                rename: (id, type, wid) => {
                    MasterCtx.hide();
                    let item = (type === 'shortcut') ? MasterCore.state.icons.find(i => i.id == id) : MasterCore.getDeepFsItem(id);
                    if(item) {
                        MasterDialog.ask("System", "Zmień nazwę:", item.name, (n) => {
                            if(n) { 
                                item.name = n; MasterCore.save(); 
                                MasterCore.renderDesktop(); 
                                MasterWindow.active.forEach((v,k)=> {if(v.app==='Explorer') MasterApp.renderExplorer(k)}); 
                            }
                        });

                    MasterCtx.hide();

                            MasterCore.state.icons = MasterCore.state.icons.filter(i => i.id != id); 
                        } else { 
                            item = MasterCore.getDeepFsItem(id, true);

                        if (list[i].children) {

                    handleEl.onpointerdown = (e) => {
                        if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'BUTTON') return;
                        e.stopPropagation();
                        el.style.left   = el.offsetLeft + 'px';
                        el.style.top    = el.offsetTop  + 'px';
                        el.style.right  = 'auto';
                        el.style.bottom = 'auto';
                        let ox = e.clientX - el.offsetLeft;
                        let oy = e.clientY - el.offsetTop;
                        const move = (m) => {
                            el.style.left = (m.clientX - ox) + 'px';
                            el.style.top  = (m.clientY - oy) + 'px';
                        };
                        const up = () => {
                            MasterWidgets.savePositions();
                            document.removeEventListener('pointermove', move);
                            document.removeEventListener('pointerup', up);
                        };
                        document.addEventListener('pointermove', move);
                        document.addEventListener('pointerup', up);

                /* --- ZEGAR ANALOGOWY (canvas + rAF) --- */
                drawAnalogClock: () => {
                    if (!MasterWidgets._analogRunning) return; /* Stop gdy widget ukryty */
                    const canvas = document.getElementById('analog-clock-canvas');
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    const now = new Date();
                    const cx = 70, cy = 70, r = 63;
                    ctx.clearRect(0, 0, 140, 140);

                    /* Tarcza */
                    ctx.beginPath();
                    ctx.arc(cx, cy, r, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255,255,255,0.03)';
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(255,255,255,0.18)';
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    /* Kreski — minutowe, godzinowe, kwadransowe */
                    for (let i = 0; i < 60; i++) {
                        const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
                        const isHour  = i % 5  === 0;
                        const isQuart = i % 15 === 0;
                        const outer = r - 2;
                        const inner = outer - (isQuart ? 12 : isHour ? 8 : 4);
                        ctx.beginPath();
                        ctx.moveTo(cx + Math.cos(angle) * inner, cy + Math.sin(angle) * inner);
                        ctx.lineTo(cx + Math.cos(angle) * outer, cy + Math.sin(angle) * outer);
                        ctx.strokeStyle = isQuart ? 'rgba(255,255,255,0.7)' : isHour ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.15)';
                        ctx.lineWidth = isQuart ? 2 : isHour ? 1.5 : 0.8;
                        ctx.stroke();
                    }

                    const h = now.getHours() % 12;
                    const m = now.getMinutes();
                    const s = now.getSeconds();
                    const ms = now.getMilliseconds();

                    /* Wskazówka godzinowa */
                    const hAngle = ((h + m / 60) / 12) * Math.PI * 2 - Math.PI / 2;
                    ctx.beginPath();
                    ctx.moveTo(cx - Math.cos(hAngle) * 10, cy - Math.sin(hAngle) * 10);
                    ctx.lineTo(cx + Math.cos(hAngle) * 38, cy + Math.sin(hAngle) * 38);
                    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3.5; ctx.lineCap = 'round'; ctx.stroke();

                    /* Wskazówka minutowa */
                    const mAngle = ((m + s / 60) / 60) * Math.PI * 2 - Math.PI / 2;
                    ctx.beginPath();
                    ctx.moveTo(cx - Math.cos(mAngle) * 12, cy - Math.sin(mAngle) * 12);
                    ctx.lineTo(cx + Math.cos(mAngle) * 54, cy + Math.sin(mAngle) * 54);
                    ctx.strokeStyle = 'rgba(255,255,255,0.88)'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.stroke();

                    /* Wskazówka sekundowa — płynna (ms) */
                    const sAngle = ((s + ms / 1000) / 60) * Math.PI * 2 - Math.PI / 2;
                    ctx.beginPath();
                    ctx.moveTo(cx - Math.cos(sAngle) * 14, cy - Math.sin(sAngle) * 14);
                    ctx.lineTo(cx + Math.cos(sAngle) * 58, cy + Math.sin(sAngle) * 58);
                    ctx.strokeStyle = '#ff5f57'; ctx.lineWidth = 1.5; ctx.lineCap = 'round'; ctx.stroke();

                    /* Punkt centralny */
                    ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                    ctx.fillStyle = '#ff5f57'; ctx.fill();
                    ctx.beginPath(); ctx.arc(cx, cy, 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#fff'; ctx.fill();

                    requestAnimationFrame(MasterWidgets.drawAnalogClock);
                },

                /* --- ZEGAR CYFROWY (styl HTC) --- */
     updateDigitalClock: () => {
                const now  = new Date();
                const h    = now.getHours(); // Pobieramy bezpośrednio format 24h
                const m    = now.getMinutes();
                
                const DAY = ['Niedziela','Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota'];
                const MON = ['Stycznia','Lutego','Marca','Kwietnia','Maja','Czerwca',
                             'Lipca','Sierpnia','Września','Października','Listopada','Grudnia'];
                
                const eTime = document.getElementById('htc-time');
                if (!eTime) return;

                // Wyświetlanie godziny w formacie 24h z zerem wiodącym
                eTime.textContent = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
                
                // Czyścimy AM/PM, ponieważ w formacie 24h jest zbędne
                document.getElementById('htc-ampm').textContent = '';
                
                // Reszta danych bez zmian
                document.getElementById('htc-date').textContent = now.getDate() + ' ' + MON[now.getMonth()] + ' ' + now.getFullYear();
                document.getElementById('htc-day').textContent  = DAY[now.getDay()];
            },

                loadNotes: () => {

                    if (el) {
                        el.value = localStorage.getItem('master_widget_notes') || '';
                        /* Autosave + blokada propagacji dołączona tylko raz */
                        if (!el.dataset.bound) {
                            el.dataset.bound = '1';
                            el.addEventListener('input', (e) => localStorage.setItem('master_widget_notes', e.target.value));
                            el.addEventListener('pointerdown', (e) => e.stopPropagation());
                        }

                clearNotes: () => {
                    const el = document.getElementById('w-notes-text');
                    if (el) { el.value = ''; localStorage.removeItem('master_widget_notes'); }
                },

                /* --- POGODA (Open-Meteo, bezpłatne API, bez klucza) --- */
                fetchWeather: async () => {
                    const content = document.getElementById('w-weather-content');
                    const cityEl  = document.getElementById('w-city');
                    if (!content) return;
                    content.innerHTML = '<div class="weather-err">Pobieranie...</div>';
                    let lat = 51.9459, lon = 14.7506, city = 'Gubin';
                    const savedLoc = JSON.parse(localStorage.getItem('master_widget_loc') || 'null');
                    if (savedLoc) { lat = savedLoc.lat; lon = savedLoc.lon; city = savedLoc.city; }
                    try {
                        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
                                  + `&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=7`;
                        const data = await (await fetch(url)).json();
                        const DN = ['Nd','Pn','Wt','Śr','Cz','Pt','So'];
                        let html = '<div class="weather-days">';
                        for (let i = 0; i < 7; i++) {
                            const date  = new Date(data.daily.time[i]);
                            const code  = data.daily.weathercode[i];
                            const hi    = Math.round(data.daily.temperature_2m_max[i]);
                            const lo    = Math.round(data.daily.temperature_2m_min[i]);
                            const icon  = MasterWidgets.WMO[code] || '🌡️';
                            const label = i === 0 ? 'Dziś' : DN[date.getDay()];
                           html += `<div class="weather-day">
                    <div class="weather-day-name">${label}</div>
                    <div class="weather-icon">
                        <img src="${icon}" class="weather-icon-img" alt="Pogoda">
                    </div>
                    <div class="weather-temp-hi">${hi}°</div>
                    <div class="weather-temp-lo">${lo}°</div>
                 </div>`;
    }
                        html += '</div>';
                        content.innerHTML = html;
                        if (cityEl) cityEl.textContent = city;
                    } catch {
                        content.innerHTML = '<div class="weather-err">Brak połączenia z API</div>';
                    }
                },

                /* Próba geolokalizacji — aktualizuje city i pobiera pogodę */
                geolocate: () => {
                    if (!navigator.geolocation) return;
                    navigator.geolocation.getCurrentPosition(async (pos) => {
                        const lat = pos.coords.latitude.toFixed(4);
                        const lon = pos.coords.longitude.toFixed(4);
                        try {
                            const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);

                            const city = d.address.city || d.address.town || d.address.village || 'Moja lokalizacja';
                            localStorage.setItem('master_widget_loc', JSON.stringify({ lat, lon, city }));
                        } catch {}
                        MasterWidgets.fetchWeather();
                    }, () => { /* geolokalizacja odrzucona — zostaje domyślna */ });

function refreshMasterChat() {
    const isInstalled = localStorage.getItem('masterChatInstalled');
    const container = document.getElementById('master-chat-wrapper');

    // Jeśli zainstalowano i jeszcze nie ma iframe'a na stronie
    if (isInstalled === 'true' && !document.getElementById('master-chat-iframe')) {
        container.innerHTML = `
            <iframe 
                id="master-chat-iframe"
                src="/czat.html" 
                style="position: fixed; bottom: 80px; right: 20px; width: 350px; height: 450px; 
                       border: none; border-radius: 15px; z-index: 9999; 
                       box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #1e1e1e;">
            </iframe>
        `;
        console.log("Master Chat: Moduł załadowany.");
    }
}

// Sprawdź przy starcie
document.addEventListener('DOMContentLoaded', refreshMasterChat);

// Nasłuchuj wiadomości ze sklepu (jeśli sklep jest w iframe)
window.addEventListener('message', (event) => {
    if (event.data.type === 'APP_INSTALLED' && event.data.app === 'Master Chat') {
        refreshMasterChat();
    }
});
