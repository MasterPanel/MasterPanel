<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Tile WebOS Dashboard</title>
    <style>
        :root {
            --bg-dark: #050505;
            --tile-w: 380px;
            --tile-h: 500px;
            /* Kolor poświaty przy zaznaczeniu (klasyczny webOS magenta) */
            --glow-color: rgba(207, 6, 82, 0.6); 
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-user-select: none;
        }

        body {
            /* Główne tło pulpitu - 5.jpg */
            background-color: var(--bg-dark);
            background-image: url('5.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Przyciemnienie tła głównego, aby kafelki były czytelne */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
        }

        header {
            padding: 60px 80px 0 80px;
            position: relative;
            z-index: 2;
        }

        #clock { 
            font-size: 6rem; 
            font-weight: 100; 
            line-height: 1; 
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        
        #date { 
            font-size: 1.5rem; 
            color: #ddd; 
            margin-top: 10px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .main-view {
            flex-grow: 1;
            display: flex;
            align-items: center;
            overflow: visible;
            position: relative;
            z-index: 2;
        }

        .carousel-track {
            display: flex;
            overflow-x: auto;
            overflow-y: visible;
            padding: 100px 0;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            width: 100%;
        }

        .carousel-track::-webkit-scrollbar { display: none; }

        .spacer { min-width: 80px; }

        /* --- STYL KAFELKA Z OBRAZEM --- */
        .tile {
            min-width: var(--tile-w);
            height: var(--tile-h);
            margin: 0 25px;
            border-radius: 30px;
            
            /* Podstawowe ustawienia tła obrazkowego */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            
            /* Ważne dla zaokrąglonych rogów przy obrazach */
            overflow: hidden; 
            
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            scroll-snap-align: center;
            cursor: pointer;
            
            /* Subtelna ramka w stanie spoczynku */
            border: 4px solid rgba(255,255,255,0.1); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* --- PRZYPISANIE OBRAZÓW DO KAFELKÓW --- */
        .tile-1 { background-image: url('1.jpg'); }
        .tile-2 { background-image: url('2.jpg'); }
        .tile-3 { background-image: url('3.jpg'); }
        .tile-4 { background-image: url('4.jpg'); }
        /* Tile 5 jest tłem głównym */
        .tile-6 { background-image: url('6.jpg'); }
        .tile-7 { background-image: url('7.jpg'); }

        .tile::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            transition: background 0.5s ease;
            z-index: 1;
        }

        /* --- EFEKT FOCUS --- */
        .tile:focus {
            outline: none;
            transform: scale(1.15);
            border-color: rgba(255,255,255,1);
            box-shadow: 0 30px 70px -10px rgba(0,0,0,0.8), 0 0 40px 10px var(--glow-color);
            z-index: 10;
            animation: floating-img 3s ease-in-out infinite;
        }

        .tile:focus::before {
            background: rgba(0,0,0,0.1);
        }

        @keyframes floating-img {
            0%, 100% { transform: scale(1.15) translateY(0); }
            50% { transform: scale(1.15) translateY(-15px); }
        }

        .tile-content {
            position: relative;
            z-index: 2;
            padding: 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            width: 100%;
            border-radius: 0 0 30px 30px;
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5));
        }

        .label { 
            font-size: 1rem; 
            color: #eee; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 8px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
        
        .title-text { 
            font-size: 2.2rem; 
            font-weight: 700; 
            line-height: 1.1; 
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        
        .status { 
            margin-top: 15px; 
            font-size: 1.1rem; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
        
        .dot { 
            width: 12px; height: 12px; 
            border-radius: 50%; 
            background: #00e676; 
            box-shadow: 0 0 10px #00e676; 
        }

    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <header>
        <div id="clock">00:00</div>
        <div id="date">Wczytywanie...</div>
    </header>

    <div class="main-view">
        <div class="carousel-track" id="track">
            <div class="spacer"></div>
 
  <a href="gui2.html" class="tile tile-1" tabindex="1">
                <div class="tile-content">
                    <div class="icon">📺</div>
                    <div class="label">Rozrywka</div>
                    <div class="title-text">Telewizja<br>Na Żywo</div>
                    <div class="status"><span class="dot"></span> TVP Sport</div>
                </div>
           
</a>            
  <a href="gui3.html"  class="tile tile-2" tabindex="2">
                <div class="tile-content">
                    <div class="icon">🍿</div>
                    <div class="label">Aplikacje</div>
                    <div class="title-text">Netflix &<br>Disney+</div>
                    <div class="status">Gotowy do oglądania</div>
                </div>
</a> 
  <a href="plik.html"  class="tile tile-3" tabindex="3">
                <div class="tile-content">
                    <div class="icon">🌡️</div>
                    <div class="label">Smart Home</div>
                    <div class="title-text">Termostat<br>Salon</div>
                    <div class="status"><span class="dot"></span> 23.5°C</div>
                </div>
</a>

<a href="mata.html"  class="tile tile-4" tabindex="4">
                <div class="tile-content">
                    <div class="icon">💡</div>
                    <div class="label">Oświetlenie</div>
                    <div class="title-text">Scena:<br>Wieczór</div>
                    <div class="status">Aktywna</div>
                </div>
 </a>

            <div class="tile tile-6" tabindex="6">
                <div class="tile-content">
                    <div class="icon">🛡️</div>
                    <div class="label">Ochrona</div>
                    <div class="title-text">Monitoring<br>Zewnętrzny</div>
                    <div class="status"><span class="dot"></span> Online</div>
                </div>
            </div>

            <div class="tile tile-7" tabindex="7">
                <div class="tile-content">
                    <div class="icon">⚙️</div>
                    <div class="label">System</div>
                    <div class="title-text">Ustawienia<br>Główne</div>
                    <div class="status">Wszystko OK</div>
                </div>
            </div>

            <div class="spacer"></div>
        </div>
    </div>

    <script>
        // Funkcja aktualizująca czas i datę
        function updateTime() {
            try {
                var now = new Date();
                
                // Godziny i minuty
                var h = now.getHours();
                var m = now.getMinutes();
                
                // Formatowanie HH:MM
                var hh = (h < 10) ? "0" + h : h;
                var mm = (m < 10) ? "0" + m : m;
                
                var clockElem = document.getElementById('clock');
                if (clockElem) {
                    clockElem.innerText = hh + ":" + mm;
                }

                // Data
                var days = ["Niedziela", "Poniedziałek", "Wtorek", "Środa", "Czwartek", "Piątek", "Sobota"];
                var months = ["Stycznia", "Lutego", "Marca", "Kwietnia", "Maja", "Czerwca", "Lipca", "Sierpnia", "Września", "Października", "Listopada", "Grudnia"];
                
                var dateElem = document.getElementById('date');
                if (dateElem) {
                    dateElem.innerText = days[now.getDay()] + ", " + now.getDate() + " " + months[now.getMonth()];
                }
            } catch (err) {
                console.log("Blad zegara: " + err);
            }
        }

        // --- Inicjalizacja Karuzeli ---
        var tiles = document.querySelectorAll('.tile');
        
        for (var i = 0; i < tiles.length; i++) {
            (function(tile) {
                // Centrowanie kafelka po otrzymaniu focusa
                tile.addEventListener('focus', function() {
                    tile.scrollIntoView({
                        behavior: 'smooth',
                        block: 'nearest',
                        inline: 'center'
                    });
                });

                // Reakcja na kliknięcie
                tile.addEventListener('click', function() {
                    tile.style.transform = 'scale(1.0)';
                    setTimeout(function() { tile.style.transform = ''; }, 150);
                    console.log("Uruchamianie: " + tile.querySelector('.title-text').innerText);
                });
            })(tiles[i]);
        }

        // --- Obsługa Klawiszy Pilota ---
        document.addEventListener('keydown', function(e) {
            var active = document.activeElement;
            
            if (e.key === 'ArrowRight' || e.keyCode === 39) {
                var next = active.nextElementSibling;
                if (next && next.classList.contains('tile')) next.focus();
            } else if (e.key === 'ArrowLeft' || e.keyCode === 37) {
                var prev = active.previousElementSibling;
                if (prev && prev.classList.contains('tile')) prev.focus();
            } else if (e.key === 'Enter' || e.keyCode === 13) {
                if(active && active.classList.contains('tile')) active.click();
            }
        });

        // --- Start Systemu po załadowaniu okna ---
        window.onload = function() {
            updateTime(); // Pierwsze wywołanie
            setInterval(updateTime, 1000); // Start pętli
            
            if(tiles.length > 0) {
                tiles[0].focus();
            }
        };
    </script>
</body>
</html>
