<script> 
      let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  // Pokaż baner po 3s
  setTimeout(() => {
    const banner = document.getElementById('pwaBanner');
    banner.classList.remove('hidden');
    banner.classList.add('animate-bounce');

   
  }, 3000);
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choiceResult) => {
      if (choiceResult.outcome === 'accepted') {
        console.log('Zainstalowano PWA');
      } else {
        console.log('Odrzucono instalację PWA');
      }
      deferredPrompt = null;
      document.getElementById('pwaBanner').classList.add('hidden');
    });
  }
}

function closePwaBanner() {
  document.getElementById('pwaBanner').classList.add('hidden');
}
</script>

<script>

  const apiKey = "b7443c3648481492ff7eb47a9f334466";
  const miasto = "Gubin";
  const weatherIcon = document.querySelector(".weather-icon");
  const desc = document.querySelector(".desc");
  const temp = document.querySelector(".temp");
  const range = document.querySelector(".range");

  function getWeather() {
    fetch(`https://api.openweathermap.org/data/2.5/weather?q=${miasto}&appid=${apiKey}&units=metric&lang=pl`)
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        const main = data.weather[0].main.toLowerCase();
        const description = data.weather[0].description;
        const temperature = Math.round(data.main.temp);
        const tempMin = Math.round(data.main.temp_min);
        const tempMax = Math.round(data.main.temp_max);

        // Wybór emoji na podstawie warunków pogodowych
        let emoji = "🌥️"; // domyślnie częściowo pochmurnie
        if (main.includes("clear")) {
          emoji = "☀️";
        } else if (main.includes("clouds")) {
          emoji = "⛅";
        } else if (main.includes("rain") || main.includes("drizzle")) {
          emoji = "🌧️";
        } else if (main.includes("thunderstorm")) {
          emoji = "⛈️";
        } else if (main.includes("snow")) {
          emoji = "❄️";
        } else if (main.includes("mist") || main.includes("fog") || main.includes("haze")) {
          emoji = "🌫️";
        }

        // Aktualizacja elementów na stronie
        weatherIcon.textContent = emoji;
        desc.textContent = description.charAt(0).toUpperCase() + description.slice(1);
        temp.textContent = `${temperature}°C`;
        range.textContent = `${tempMax}° / ${tempMin}°`;
      })
      .catch(error => {
        console.error("Błąd pobierania pogody:", error);
      });
  }

  // Pierwsze pobranie i ustawienie interwału
  getWeather();
  setInterval(getWeather, 30 * 60 * 1000); // Odśwież co 30 minut

        <button onclick="toggleLock()" id="lockButton" class="text-9xl text-red-500 transition duration-300 hover:scale-110 pulse">
          <i class="fas fa-lock"></i>
        </button>
        <br><br>
        <div id="lockStatus" class="window text-xl text-black font-semiboldbg-white/30 backdrop-blur-3xl px-4 py-2 rounded-xl">Zablokowany</div>
        <br>
        <button onclick="closeLockPage('slide-up')" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-xl text-white">Zamknij</button>
      </div>




  <script>
    let locked = true;

    async function toggleLock() {
      const icon = document.querySelector("#lockButton i");
      const lockStatus = document.getElementById("lockStatus");

      // efekt drgania
      icon.classList.add("shake");
      icon.addEventListener("animationend", () => icon.classList.remove("shake"), { once: true });

      let cmd = "";
      if (locked) {
        // odblokowanie
        icon.classList.remove("fa-lock");
        icon.classList.add("fa-lock-open", "text-black");
        icon.classList.remove("text-red-500");
        lockStatus.textContent = "Odblokowane";
        lockStatus.classList.remove("text-red-500");
        lockStatus.classList.add("text-black");
        cmd = "unlock";
      } else {
        // zablokowanie
        icon.classList.add("fa-lock", "text-red-500");
        icon.classList.remove("fa-lock-open", "text-black");
        lockStatus.textContent = "Zablokowane";
        lockStatus.classList.add("text-red-500");
        lockStatus.classList.remove("text-black");
        cmd = "lock";
      }

      locked = !locked;

      // wysyłka POST do API
      try {
        const res = await fetch("https://masterpanell.vercel.app/api/zamek", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ cmd })
        });
        const data = await res.json();
        console.log("API:", data);
      } catch (err) {
        console.error("Błąd API:", err);
      }
    }

    function openLockPage() {
      const lockModal = document.getElementById("lockModal");
      const lockModalInner = document.getElementById("lockModalInner");

      lockModal.classList.remove("hidden");
      lockModalInner.classList.add("modal-enter");

      requestAnimationFrame(() => {
        lockModalInner.classList.add("modal-enter-active");
        lockModalInner.classList.remove("modal-enter");
      });

      document.body.style.overflow = "hidden";
    }

    function closeLockPage() {
      const lockModal = document.getElementById("lockModal");
      const lockModalInner = document.getElementById("lockModalInner");

      lockModalInner.classList.add("modal-exit-active");
      lockModalInner.classList.remove("modal-enter-active");

      setTimeout(() => {
        lockModal.classList.add("hidden");
        lockModalInner.classList.remove("modal-exit-active");
        document.body.style.overflow = "auto";
      }, 300);
    }
  </script>

  <script>
  const overlay = document.getElementById("secondPage");
  const box = document.getElementById("animBox");

  function openPage(type) {
    const overlay = document.getElementById("secondPage");
    const fanModalInner = document.getElementById("fanModalInner");

    overlay.classList.remove("hidden");
    fanModalInner.classList.add("fan-modal-enter");

    requestAnimationFrame(() => {
      fanModalInner.classList.add("fan-modal-enter-active");
      fanModalInner.classList.remove("fan-modal-enter");
    });

    document.body.style.overflow = "hidden";
  }

  function closePage() {
    const overlay = document.getElementById("secondPage");
    const fanModalInner = document.getElementById("fanModalInner");

    fanModalInner.classList.add("fan-modal-exit-active");
    fanModalInner.classList.remove("fan-modal-enter-active");

    setTimeout(() => {
      overlay.classList.add("hidden");
      fanModalInner.classList.remove("fan-modal-exit-active");
      document.body.style.overflow = "auto";
    }, 300); // dopasowane do czasu animacji
  }

  const fanBlades = document.getElementById('fanBlades');
  const toggleFanButton = document.getElementById('toggleFanButton');
  const speedSlider = document.getElementById('speedSlider');
  const currentSpeedValue = document.getElementById('currentSpeedValue');

  let isFanOn = false;
  let currentSpeed = parseInt(speedSlider.value);

  function updateFanSpeed() {
    if (isFanOn) {
      const animationDuration = 2.2 - (currentSpeed * 0.2);
      fanBlades.style.animation = `rotateFan ${animationDuration}s linear infinite`;
    } else {
      fanBlades.style.animation = 'none';
    }
    currentSpeedValue.textContent = currentSpeed;
  }

  async function sendFanCommand(on, speed) {
    try {
      await fetch('https://masterpanell.vercel.app/api/fan', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ on, speed })
      });
    } catch (e) {
      console.error("Błąd wysyłania do API", e);
    }
  }

  toggleFanButton.addEventListener('click', () => {
    isFanOn = !isFanOn;
    toggleFanButton.textContent = isFanOn ? 'Wyłącz' : 'Włącz';
    updateFanSpeed();
    sendFanCommand(isFanOn, currentSpeed);
  });

  speedSlider.addEventListener('input', () => {
    currentSpeed = parseInt(speedSlider.value);
    updateFanSpeed();
    sendFanCommand(isFanOn, currentSpeed);
  });

  updateFanSpeed();
</script>
