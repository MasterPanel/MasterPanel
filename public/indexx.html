
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000">

    <title>Master Panel</title>
    
    <link rel="manifest" href="/manifest.json">
    <script>
        /* Rejestracja Service Workera dla PWA */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                setTimeout(() => {
                    navigator.serviceWorker.register('service-worker.js');
                }, 100); 
            });
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { 
            --kolor-tla: #111; 
            --cien-jasny: rgba(255, 255, 255, 0.03); 
            --cien-ciemny: rgba(0, 0, 0, 0.6); 
            --kolor-akcentu: #00f2ff; 
            --tekst-glowny: #000; 
            --akcent-niebieski: #00f2ff;
            --szklo: rgba(20, 20, 20, 0.7);
            --szklo-naglowek: rgba(255, 255, 255, 0.05);
            --obramowanie: rgba(255, 255, 255, 0.12);
            --akcent-zolty: #FFD54F;
            --bezpieczna-gora: env(safe-area-inset-top);
            --bezpieczny-dol: env(safe-area-inset-bottom);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
       
        /* Blokada przewijania na poziomie HTML i Body */
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
        }
        
        body { 
            user-select: none;
            margin: 0;
            background: #000;
            background-size: cover;              
            background-repeat: no-repeat;        
            background-position: center center;  
            background-attachment: fixed;    
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('https://www.tapeciarnia.pl/tapety/normalne/tapeta-ciemne-chmury-na-jeziorem-peyto-lake.jpg'); 
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            z-index: -1;
            display: block;
        }

        #nakladka-pelnodostepna {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.01);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .kontener-aplikacji { 
            width: 400px; 
            height: 890px; 
            background:#1114;
            border-radius: 10px; 
            position: relative; 
            overflow: hidden; 
            border: 1px solid #111; 
            padding-top: var(--bezpieczna-gora);
            padding-bottom: var(--bezpieczny-dol);
        }
        
        .suwak-ekranow { display: flex; width: 500%; height: 100%; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        
        .ekran { 
            width: 20%; 
            height: 100%;  
            padding: 10px 15px 100px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            overflow-y: auto; 
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }

        .ekran::-webkit-scrollbar { display: none; }

        .siatka-kontroli { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        
        .karta-kontroli { 
            height: 160px; background: #9991; backdrop-filter: blur(7px); border-radius: 20px; padding: 15px;
            box-shadow: 8px 8px 16px var(--cien-ciemny); display: flex; flex-direction: column; 
            position: relative; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05);
        }
        
        .karta-kontroli-2 { 
            height: 160px; backdrop-filter: blur(7px); border-radius: 20px; padding: 15px;
            box-shadow: 8px 8px 16px var(--cien-ciemny); display: flex; flex-direction: column; 
            position: relative; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .karta-kontroli-2.aktywna, .karta-kontroli.aktywna { background: #1119; backdrop-filter: blur(7px); border-color: var(--kolor-akcentu); }
        
        .naglowek-karty { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; margin-bottom: 10px; }
        .nazwa-pokoju { font-size: 0.9rem; font-weight: bold; color: var(--kolor-akcentu); text-transform: uppercase; }
        
        .przelacznik { width: 44px; height: 22px; background: #0009; backdrop-filter: blur(11px); border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .uchwyt { width: 16px; height: 16px; background: var(--kolor-akcentu); border-radius: 50%; position: absolute; top: 3px; left: 4px; transition: 0.3s; }
        .przelacznik.wlaczony { background: var(--kolor-akcentu); }
        .przelacznik.wlaczony .uchwyt { left: 24px; background: #000; }

        .ikona-karty { flex-grow: 1; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; color: #000; transition: 0.3s; }
        .aktywna .ikona-karty { color: var(--kolor-akcentu); text-shadow: 0 0 20px rgba(255,94,0,0.4); }
        .ikona-karty-duza { margin-left:40px; font-size: 5rem; color: #000; }
        .aktywna .ikona-karty-duza { color: var(--kolor-akcentu); text-shadow: 0 0 20px rgba(255,94,0,0.4); }
        .stopka-karty { width: 100%; margin-top: 10px; }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-runnable-track { height: 4px; background: #000; border-radius: 5px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--kolor-akcentu); margin-top: -6px; cursor: pointer; border: 2px solid #25262b; }
        
        #suwak-zaslony::-webkit-slider-thumb { background: var(--akcent-niebieski); box-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        #suwak-zaslony::-webkit-slider-runnable-track { background: #000; }

        .kontener-zaslony { display: flex; flex-direction: column; align-items: center; gap: 80px; margin-top: 40px; position: relative; }
        .przyciski-zaslony { display: flex; gap: 20px; }
        .przycisk-zaslony {
            width: 70px; height: 70px;  background: #9992; backdrop-filter: blur(7px); border: 1px solid var(--obramowanie);
            border-radius: 15px; color: var(--tekst-glowny); font-size: 2rem;
            display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .przycisk-zaslony:active { background: var(--kolor-akcentu); transform: scale(0.9); }
        .otoczka-okna { position: relative; width: 350px; height: 300px; display: flex; justify-content: center; }
        .rama-okna { width: 100%; height: 100%; background: #333; border: 4px solid #444; position: relative; border-radius: 10px; overflow: hidden; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); z-index: 1; }
        .szyba-okna { position: absolute; inset: 0; background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); }
        .tkanina-zaslony { position: absolute; top: -10px; left: -5px; height: 120%; width: 20%; background: #222; border-right: 4px solid #111; transition: width 1.5s ease-out; z-index: 10; box-shadow: 10px 0 20px rgba(0,0,0,0.5); border-radius: 0 0 5px 0; }
        .szyna-zaslony { position: absolute; top: -15px; width: 105%; height: 10px; background: #555; z-index: 11; border-radius: 5px; }

        .kontener-rolety { display: flex; flex-direction: column; align-items: center; gap: 40px; margin-top: 20px; }
        .widok-okna { position: relative; width: 280px; height: 350px; background: #333; border: 8px solid #444; border-radius: 15px; overflow: hidden; box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .tlo-niebo { position: absolute; inset: 0; background: linear-gradient(180deg, #00d2ff 0%, #3a7bd5 100%); z-index: 1; }
        .tkanina-rolety { position: absolute; top: 0; left: 0; width: 100%; height: 0%; background: #111; border-bottom: 12px solid #222; z-index: 5; transition: height 2.5s ease-out; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .szyna-rolety-gora { position: absolute; top: 0; width: 100%; height: 15px; background: #222; z-index: 6; border-bottom: 1px solid #000; }
        .przyciski-rolety { display: flex; gap: 20px; margin-top: 20px; }
        .przycisk-rolety { width: 75px; height: 75px;  background: #9992; backdrop-filter: blur(7px); border: 1px solid var(--obramowanie); border-radius: 20px; color: var(--tekst-glowny); font-size: 2.5rem; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; }
        .przycisk-rolety:active { background: var(--akcent-niebieski); color: #000; transform: scale(0.9); }

        .siatka-wykresow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .kontener-wykresu { text-align: center; height: 180px; width: 180px; background: #9992; backdrop-filter: blur(7px); border-radius: 20px; padding: 15px; box-shadow: 8px 8px 16px var(--cien-ciemny); display: flex; flex-direction: column; align-items: center; position: relative; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .karta-podsumowania { width: 100%; height: 220px; background: #9992; backdrop-filter: blur(7px); border-radius: 20px; padding: 20px; box-shadow: 8px 8px 16px var(--cien-ciemny); border: 1px solid rgba(255,255,255,0.05); margin-top: 10px; display: flex; flex-direction: column; }

        .pasek-nawigacji { position: absolute; bottom: calc(15px + var(--bezpieczny-dol)); left: 50%; transform: translateX(-50%); width: 95%; height: 60px; background: #9992; backdrop-filter: blur(7px); border-radius: 10px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.05); z-index: 100; }
        .przycisk-nawigacji { background: none; border: none; color: #000; font-size: 1.5rem; cursor: pointer; transition: 0.3s; }
        .przycisk-nawigacji.aktywny { color: var(--kolor-akcentu); }
        
 
        .karta-podgladu { background: #9992; backdrop-filter: blur(7px); border-radius:22px; border:1px solid var(--obramowanie); margin-bottom:15px; overflow:hidden; box-shadow:0 10px 25px rgba(0,0,0,.6); }
        .karta-podgladu-2 { background: #9992; backdrop-filter: blur(7px); border-radius:22px; border:1px solid var(--obramowanie); margin-bottom:15px; overflow:hidden; box-shadow:0 10px 25px rgba(0,0,0,.6); width:210%; height:60%; opacity: 0; transition: opacity 0.3s ease-in-out; }
        .karta-podgladu-2:hover { opacity: 1; }
        
        .tytul-podgladu { padding:10px 15px; font-size:.9rem; color: var(--kolor-akcentu); border-bottom:1px solid var(--obramowanie); display:flex; align-items:center; gap:8px; }
        
        /* ZMIANA: Overflow hidden dla płynnego powiększania */
        .tresc-podgladu { height:260px; background: rgba(0,0,0,0.2); position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .nakladka-klikana { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; cursor: pointer; background: transparent; }
        .nakladka-klikana:active { background: rgba(255, 255, 255, 0.05); }

        .miejsce-na-kamere { position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; z-index: 1; text-align: center; }
        .miejsce-na-kamere i { font-size: 3rem; margin-bottom: 10px; animation: pulsowanie 2s infinite; }
        .miejsce-na-kamere span { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; font-weight: bold; }
        
        #widok-kamery { position: relative; width: 100%; height: 100%; object-fit: cover; z-index: 2; opacity: 0; transition: opacity 0.5s ease-in, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: block; }
        #widok-kamery.zaladowany { opacity: 1; }
       
        @keyframes pulsowanie { 0% { opacity: 0.3; } 50% { opacity: 0.6; } 100% { opacity: 0.3; } }

        .tresc-podgladu iframe { position: fixed; top:35px; right:70px; transform: scale(1.2); transform-origin: 0 0; width:100%; height:100%; border:0; object-fit:cover; }

        #baner-instalacji-pwa {
            position: absolute; bottom: -200px; left: 50%; transform: translateX(-50%); width: 95%; background: #1117; border-radius: 24px; padding: 20px; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); z-index: 1000; transition: bottom 0.5s cubic-bezier(0.23, 1, 0.32, 1); display: flex; flex-direction: column; gap: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px);
        }
        #baner-instalacji-pwa.widoczny { bottom: calc(85px + var(--bezpieczny-dol)); }
        .naglowek-pwa { display: flex; align-items: center; gap: 15px; }
        .ikona-pwa { width: 48px; height: 48px; background: #000; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; color: white; }
        .tekst-pwa { flex-grow: 1; }
        .tekst-pwa h2 { margin: 0; font-size: 1.3rem; color: #333 }
        .tekst-pwa h3 { margin: 0; font-size: 1.5rem; color: #fff; }
        .tekst-pwa p { margin: 2px 0 0; font-size: 0.8rem; color: #aaa; }
        .akcje-pwa { display: flex; justify-content: flex-end; gap: 10px; }
        .przycisk-pwa { padding: 10px 20px; border-radius: 20px; border: none; font-size: 0.9rem; font-weight: bold; cursor: pointer; }
        .przycisk-pwa-anuluj { background: transparent; color: #111; }
        .przycisk-pwa-instaluj { background: #444; color: white; }
        
        /* STYLIZACJA MODALA DLA IFRAME */
        #modal-iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #modal-iframe iframe {
            width: 100%;
            flex-grow: 1;
            border: none;
            padding-top: var(--bezpieczna-gora);
        }
        
        .zamknij-modal {
            position: absolute;
            top: calc(10px + var(--bezpieczna-gora));
            right: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 2100;
            border: 1px solid var(--obramowanie);
        }
        
        /* Kontener dla nakładających się ikon */
        .icon-stack {
            font-family: "Font Awesome 6 Free" !important;
            display: inline-block;
            position: relative;
            /* Rozmiar całego zestawu */
            font-size: 5rem; 
        }

        .fa-tablet {
            color: #000;
            rotate: 180deg;
        }

        .fa-circle {
            position: absolute;
            top: 47%;
            left: 41%;
            font-size: 0.5em;
            color: #111;
        }
        
    </style>
</head>
<body onclick="agresywneSprawdzenieFullscreen()">
    <div id="nakladka-pelnodostepna" onclick="zadajTrybFullscreen()"></div>
    
    <div class="kontener-aplikacji" id="kontenerAplikacji">
        
        <div id="modal-iframe">
            <div class="zamknij-modal" onclick="zamknijModal()"><i class="fas fa-times"></i></div>
            <iframe id="iframe-cel" src=""></iframe>
        </div>

        <div id="baner-instalacji-pwa">
            <div class="naglowek-pwa">
                <div class="ikona-pwa"><i class="fas fa-home"></i></div>
                <div class="tekst-pwa">
                    <h2>Zainstaluj aplikację!</h2>
                    <h3>Master Panel!</h3>
                </div>
            </div>
            <div class="akcje-pwa">
                <button class="przycisk-pwa przycisk-pwa-anuluj" onclick="zamknijBanerPWA()">Anuluj</button>
                <button class="przycisk-pwa przycisk-pwa-instaluj" onclick="instalujPWA()">Zainstaluj</button>
            </div>
        </div>

        <div class="suwak-ekranow" id="glownySuwak">
            <div class="ekran">
                <h2 style="text-align: center; font-size: 30px; color: var(--kolor-akcentu); margin-top: 0px;">Master Panel</h2>
                <div class="siatka-kontroli">
                    <div class="karta-kontroli" id="karta-salon">
                        <div class="naglowek-karty"><span class="nazwa-pokoju">Salon</span><div class="przelacznik" onclick="przelaczUrzadzenie('salon', this)"><div class="uchwyt"></div></div></div>
                        <div class="ikona-karty"><i class="fas fa-couch"></i></div>
                        <div class="stopka-karty"><input type="range" min="0" max="100" value="0" onchange="wyslijPolecenie('salon', this.value)"></div>
                    </div>
                    <div class="karta-kontroli" id="karta-sypialnia">
                        <div class="naglowek-karty"><span class="nazwa-pokoju">Sypialnia</span><div class="przelacznik" onclick="przelaczUrzadzenie('sypialnia', this)"><div class="uchwyt"></div></div></div>
                        <div class="ikona-karty"><i class="fas fa-bed"></i></div>
                        <div class="stopka-karty"><input type="range" min="0" max="100" value="0" onchange="wyslijPolecenie('sypialnia', this.value)"></div>
                    </div>
                    <div class="karta-kontroli" id="karta-kuchnia">
                        <div class="naglowek-karty"><span class="nazwa-pokoju">Kuchnia</span><div class="przelacznik" onclick="przelaczUrzadzenie('kuchnia', this)"><div class="uchwyt"></div></div></div>
                        <div class="ikona-karty"><i class="fas fa-utensils"></i></div>
                        <div class="stopka-karty"><input type="range" min="0" max="100" value="0" onchange="wyslijPolecenie('kuchnia', this.value)"></div>
                    </div>
                    <div class="karta-kontroli" id="karta-lena">
                        <div class="naglowek-karty"><span class="nazwa-pokoju">Lena</span><div class="przelacznik" onclick="przelaczUrzadzenie('lena', this)"><div class="uchwyt"></div></div></div>
                        <div class="ikona-karty"><i class="fas fa-child-dress"></i></div>
                        <div class="stopka-karty"><input type="range" min="0" max="100" value="0" onchange="wyslijPolecenie('lena', this.value)"></div>
                    </div>
                </div>
                <div class="siatka-kontroli">
                    <div class="karta-kontroli-2" id="zamek-glowny" onclick="przelaczZamek('zamek-glowny')">
                        <div class="naglowek-karty"><span class="nazwa-pokoju">Zamek</span></div>
                        <div class="ikona-karty-duza"><i class="fas fa-lock" id="ikona-zamek-glowny"></i></div>
                    </div>
                    <div class="karta-kontroli-2" onclick="otworzModal('tv.html')">
                        <div class="naglowek-karty"><span class="nazwa-pokoju">Pilot</span></div>
                        <div class="ikona-karty-duza"><i class="fas fa-calculator"></i></div>     
                    </div> 
                    <div class="karta-kontroli-2" onclick="otworzModal('listwa.html')">
                        <div class="naglowek-karty"><span class="nazwa-pokoju">Listwa</span></div>
                        <div class="ikona-karty-duza"><i class="fas fa-plug"></i></div>       
                    </div> 
                    <div class="karta-kontroli-2" onclick="otworzModal('PRALKA.html')">
                        <div class="naglowek-karty"><span class="nazwa-pokoju">Pralka</span></div>
                        <div class="ikona-karty-duza">
                            <i class="fas fa-tablet"></i>
                            <i class="fas fa-circle"></i>
                        </div>      
                    </div> 
                </div>
            </div>

            <div class="ekran">
                <h2 style="text-align: center; font-size: 30px; color: var(--kolor-akcentu); margin-top: 0px;">Pomiary</h2>
                <div class="siatka-wykresow" id="siatkaWykresow"></div>
                <div class="karta-podsumowania">
                    <span class="nazwa-pokoju" style="margin-bottom: 15px; display: block;">Porównanie Ogólne</span>
                    <div style="flex-grow: 1; position: relative;">
                        <canvas id="wykresSlupkowyWszystkiePokoje"></canvas>
                    </div>
                </div>
            </div>

            <div class="ekran">
                <h2 style="text-align: center; font-size: 30px; color: var(--kolor-akcentu); margin-top: 0px;">Zasłona</h2>
                <div class="kontener-zaslony">
                    <div class="otoczka-okna">
                        <div class="szyna-zaslony"></div>
                        <div class="rama-okna"><div class="szyba-okna"></div></div>
                        <div class="tkanina-zaslony" id="tkaninaZaslony"></div>
                    </div>
                    <div style="width: 85%; margin-top: 40px;">
                        <input type="range" id="suwak-zaslony" min="0" max="100" value="0" oninput="aktualizujWidokZaslony(this.value)" onchange="wyslijPolecenieZaslony(this.value)">
                    </div>
                    <div class="przyciski-zaslony">
                        <div class="przycisk-zaslony" onclick="ruchZaslony(0)"><i class="fas fa-arrow-left"></i></div>
                        <div class="przycisk-zaslony" onclick="ruchZaslony('stop')"><i class="fas fa-pause"></i></div>
                        <div class="przycisk-zaslony" onclick="ruchZaslony(100)"><i class="fas fa-arrow-right"></i></div>
                    </div>
                </div>
            </div>

            <div class="ekran">
                <h2 style="text-align: center; font-size: 30px; color: var(--kolor-akcentu); margin-top: 0px;">Roleta</h2>
                <div class="kontener-rolety">
                    <div class="widok-okna">
                        <div class="szyna-rolety-gora"></div>
                        <div class="tlo-niebo"></div>
                        <div id="tkaninaRolety" class="tkanina-rolety"></div>
                    </div>
                    <input type="range" id="suwak-rolety" min="0" max="100" value="0" oninput="aktualizujWidokRolety(this.value)" onchange="wyslijPolecenieZaslony(this.value)">
                    <div class="przyciski-rolety">
                        <div class="przycisk-rolety" onclick="ruchRolety(0)"><i class="fas fa-caret-up"></i></div>
                        <div class="przycisk-rolety" onclick="ruchRolety('stop')"><i class="fas fa-pause"></i></div>
                        <div class="przycisk-rolety" onclick="ruchRolety(100)"><i class="fas fa-caret-down"></i></div>
                    </div>
                </div>
            </div>

            <div class="ekran">
                <h2 style="text-align: center; font-size: 30px; color: var(--kolor-akcentu); margin-top: 0px;">Podgląd</h2>
                <div class="karta-podgladu">
                    <div class="tytul-podgladu"><i class="fas fa-video"></i> Kamera IP</div>
                    <div class="tresc-podgladu">
                        <div class="nakladka-klikana" onclick="window.location.href='KAMERA.html';"></div>   
                        <iframe src=""></iframe>
                        <div class="miejsce-na-kamere">
                            <i class="fas fa-video-slash"></i>
                            <span>Kamera Niedostępna!</span>
                        </div>
                    </div>
                </div>
                <div class="karta-podgladu">
                    <div class="tytul-podgladu"><i class="fas fa-map-marked-alt"></i> Lokalizacja</div>
                    <div class="tresc-podgladu">
                        <iframe src="mapa.html"></iframe>
                    </div>
                </div>
            </div>
        </div>

        <div class="pasek-nawigacji">
            <button class="przycisk-nawigacji aktywny" id="przycisk-naw-0" onclick="nawiguj(0)"><i class="fas fa-home"></i></button>
            <button class="przycisk-nawigacji" id="przycisk-naw-1" onclick="nawiguj(1)"><i class="fas fa-chart-pie"></i></button>
            <button class="przycisk-nawigacji" id="przycisk-naw-2" onclick="nawiguj(2)"><i class="fas fa-scroll"></i></button>
            <button class="przycisk-nawigacji" id="przycisk-naw-3" onclick="nawiguj(3)"><i class="fa-regular fa-window-maximize"></i></button>
            <button class="przycisk-nawigacji" id="przycisk-naw-4" onclick="nawiguj(4)"><i class="fas fa-layer-group"></i></button>
        </div>
    </div>

    <script>
        const API_POLECEN = "api/commands";
        const API_DHT = "api/dht";
        const API_ZAMKA = "api/zamek";
        const API_ZASLONY = "api/zaslona";

        let wykresyPokoi = {};
        let wykresPodsumowania = null;
        let aktualnyEkran = 0;
        const liczbaEkranow = 5;

        /* FUNKCJE MODALA */
        function otworzModal(url) {
            const modal = document.getElementById('modal-iframe');
            const iframe = document.getElementById('iframe-cel');
            iframe.src = url;
            modal.style.display = 'flex';
        }

        function zamknijModal() {
            const modal = document.getElementById('modal-iframe');
            const iframe = document.getElementById('iframe-cel');
            iframe.src = "";
            modal.style.display = 'none';
        }

        function otworzWNowymOknie(url) { window.open(url, '_blank'); }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.getElementById('nakladka-pelnodostepna').style.display = 'flex';
            }
        });

        function zadajTrybFullscreen() {
            const el = document.documentElement;
            const zadanie = el.requestFullscreen || el.webkitRequestFullScreen || el.mozRequestFullScreen || el.msRequestFullscreen;
            if (zadanie) {
                zadanie.call(el).then(() => {
                    document.getElementById('nakladka-pelnodostepna').style.display = 'none';
                }).catch(err => console.log("Czekam na gest..."));
            }
        }

        function agresywneSprawdzenieFullscreen() { if (!document.fullscreenElement) zadajTrybFullscreen(); }

        let startDotykuX = 0;
        let koniecDotykuX = 0;
        const kontenerAplikacji = document.getElementById('kontenerAplikacji');

        kontenerAplikacji.addEventListener('touchstart', e => { startDotykuX = e.changedTouches[0].screenX; }, {passive: true});
        kontenerAplikacji.addEventListener('touchend', e => { koniecDotykuX = e.changedTouches[0].screenX; obsluzGest(); }, {passive: true});

        function obsluzGest() {
            // Blokuj gesty swipu jeśli modal jest otwarty
            if(document.getElementById('modal-iframe').style.display === 'flex') return;
            
            const prog = 50;
            if (koniecDotykuX < startDotykuX - prog && aktualnyEkran < liczbaEkranow - 1) nawiguj(aktualnyEkran + 1);
            if (koniecDotykuX > startDotykuX + prog && aktualnyEkran > 0) nawiguj(aktualnyEkran - 1);
        }

        let monitInstalacji;
        const banerPWA = document.getElementById('baner-instalacji-pwa');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            monitInstalacji = e;
            setTimeout(() => { banerPWA.classList.add('widoczny'); }, 3000);
        });
        function zamknijBanerPWA() { banerPWA.classList.remove('widoczny'); }
        async function instalujPWA() {
            if (!monitInstalacji) return;
            zamknijBanerPWA();
            monitInstalacji.prompt();
            await monitInstalacji.userChoice;
            monitInstalacji = null;
        }

        function aktualizujWidokZaslony(wartosc) {
            const tkanina = document.getElementById('tkaninaZaslony');
            tkanina.style.width = `${20 + (wartosc * 0.83)}%`;
        }
        function ruchZaslony(cel) {
            if (cel !== 'stop') {
                document.getElementById('suwak-zaslony').value = cel;
                aktualizujWidokZaslony(cel);
            }
            wyslijPolecenieZaslony(cel);
        }
        function aktualizujWidokRolety(wartosc) {
            document.getElementById('tkaninaRolety').style.height = `${wartosc}%`;
        }
        function ruchRolety(cel) {
            if (cel !== 'stop') {
                document.getElementById('suwak-rolety').value = cel;
                aktualizujWidokRolety(cel);
            }
            wyslijPolecenieZaslony(cel);
        }
        async function wyslijPolecenieZaslony(wartosc) {
            try { await fetch(API_ZASLONY, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ position: wartosc }) }); } catch (e) { console.error(e); }
        }
        
        function stworzKontenerWykresu(pokoj, siatka) {
            const div = document.createElement('div');
            div.className = 'kontener-wykresu';
            const nazwaWyswietlana = pokoj.charAt(0).toUpperCase() + pokoj.slice(1);            
            div.innerHTML = `
                <span style="font-size:0.8rem; color:#888; text-transform: uppercase; font-weight:bold;">${nazwaWyswietlana}</span>
                <div class="otoczka-wykresu" style="position: relative; width: 100%; height: 110px;">
                    <canvas id="wykres-${pokoj}"></canvas>
                    <div id="wartosc-${pokoj}" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
                        <div class="wartosc-t" style="color: #ff5e00; font-weight: bold; font-size: 1.1rem;">0°C</div>
                        <div class="wartosc-h" style="color: #00f2ff; font-size: 0.8rem;">0%</div>
                    </div>
                </div>`;
            siatka.appendChild(div);
            inicjujWykres(pokoj);
        }

        function inicjujWykres(pokoj) {
            const plotno = document.getElementById(`wykres-${pokoj}`);
            if (!plotno) return;
            wykresyPokoi[pokoj] = new Chart(plotno.getContext('2d'), { 
                type: 'doughnut', 
                data: { datasets: [{ data: [0, 40], backgroundColor: ['#ff5e00', '#111'], borderWidth: 0 }, { data: [0, 100], backgroundColor: ['#00f2ff', '#111'], borderWidth: 0 }] }, 
                options: { cutout: '70%', plugins: { legend: false }, maintainAspectRatio: false, animation: { duration: 500 } } 
            });
        }

        async function odswiezDHT() {
            try {
                const odp = await fetch(API_DHT);
                if (!odp.ok) return;
                const dane = await odp.json();
                const siatka = document.getElementById('siatkaWykresow');
                const etykiety = [], temp = [], wilg = [];
                Object.keys(dane).forEach(pokoj => {
                    if (!wykresyPokoi[pokoj]) stworzKontenerWykresu(pokoj, siatka);
                    const t = parseFloat(dane[pokoj].temp), h = parseFloat(dane[pokoj].hum);
                    aktualizujWykres(pokoj, t, h);
                    etykiety.push(pokoj === 'lazienka' ? 'Kuchnia' : pokoj);
                    temp.push(t); wilg.push(h);
                });
                aktualizujWykresPodsumowania(etykiety, temp, wilg);
            } catch (e) { console.warn("Błąd czujników"); }
        }

        async function odswiezSwiatla() {
            try {
                const pokoje = ['salon', 'sypialnia', 'kuchnia', 'lena'];
                for (const pokoj of pokoje) {
                    const odp = await fetch(`${API_POLECEN}?room=${pokoj}`);
                    const dane = await odp.json();
                    if (dane && dane.brightness !== undefined) {
                        aktualizujInterfejsSwiatla(pokoj, dane.brightness);
                    }
                }
            } catch (e) { console.warn("Błąd synchronizacji świateł"); }
        }

        function aktualizujInterfejsSwiatla(pokoj, jasnosc) {
            const karta = document.getElementById(`karta-${pokoj}`);
            if (!karta) return;
            const przelacznik = karta.querySelector('.przelacznik');
            const suwak = karta.querySelector('input[type=range]');
            
            suwak.value = jasnosc;
            if (jasnosc > 0) {
                karta.classList.add('aktywna');
                przelacznik.classList.add('wlaczony');
            } else {
                karta.classList.remove('aktywna');
                przelacznik.classList.remove('wlaczony');
            }
        }

        function aktualizujWykres(pokoj, t, h) {
            const wykres = wykresyPokoi[pokoj];
            if (!wykres) return;
            wykres.data.datasets[0].data = [Math.min(t, 40), Math.max(0, 40 - t)];
            wykres.data.datasets[1].data = [Math.min(h, 100), Math.max(0, 100 - h)];
            wykres.update();
            const poleWartosci = document.getElementById(`wartosc-${pokoj}`);
            if (poleWartosci) {
                poleWartosci.querySelector('.wartosc-t').innerText = `${t}°C`;
                poleWartosci.querySelector('.wartosc-h').innerText = `${h}%`;
            }
        }

        function aktualizujWykresPodsumowania(etykiety, temperatury, wilgotnosci) {
            const ctx = document.getElementById('wykresSlupkowyWszystkiePokoje').getContext('2d');
            if (!wykresPodsumowania) {
                wykresPodsumowania = new Chart(ctx, { 
                    type: 'bar', 
                    data: { labels: etykiety, datasets: [{ label: 'Temp', data: temperatury, backgroundColor: '#ff5e00', borderRadius: 5 }, { label: 'Wilg', data: wilgotnosci, backgroundColor: '#00f2ff', borderRadius: 5 }] }, 
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: false }, scales: { y: { beginAtZero: true, grid: { color: '#222' } }, x: { grid: { display: false } } } } 
                });
            } else {
                wykresPodsumowania.data.labels = etykiety;
                wykresPodsumowania.data.datasets[0].data = temperatury;
                wykresPodsumowania.data.datasets[1].data = wilgotnosci;
                wykresPodsumowania.update();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            odswiezDHT();
            odswiezSwiatla(); 
            setInterval(odswiezDHT, 5000);
            setInterval(odswiezSwiatla, 5000); 
        });

        function nawiguj(indeks) {
            aktualnyEkran = indeks;
            document.getElementById('glownySuwak').style.transform = `translateX(-${indeks * 20}%)`;
            document.querySelectorAll('.przycisk-nawigacji').forEach(b => b.classList.remove('aktywny'));
            document.getElementById(`przycisk-naw-${indeks}`).classList.add('aktywny');
        }

        async function wyslijPolecenie(pokoj, wartosc) {
            aktualizujInterfejsSwiatla(pokoj, wartosc);
            try {
                await fetch(API_POLECEN, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ room: pokoj, brightness: parseInt(wartosc) }) });
            } catch (e) { console.error("API Error"); }
        }

        function przelaczUrzadzenie(pokoj, el) {
            const wlaczony = !el.classList.contains('wlaczony');
            const wartosc = wlaczony ? 100 : 0;
            wyslijPolecenie(pokoj, wartosc);
        }

        async function przelaczZamek(idZamka) {
            const karta = document.getElementById(idZamka);
            const jestZablokowany = !karta.classList.contains('aktywna');
            const polecenie = jestZablokowany ? "unlock" : "lock";
            aktualizujInterfejsZamka(idZamka, polecenie);
            try {
                await fetch(API_ZAMKA, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ cmd: polecenie }) });
            } catch (e) { aktualizujInterfejsZamka(idZamka, jestZablokowany ? "lock" : "unlock"); }
        }

        function aktualizujInterfejsZamka(idZamka, stan) {
            const karta = document.getElementById(idZamka);
            const ikona = document.getElementById('ikona-' + idZamka);
            if (stan === "unlock") {
                karta.classList.add('aktywna');
                ikona.classList.replace('fa-lock', 'fa-lock-open');
                ikona.style.color = "var(--akcent-niebieski)";
            } else {
                karta.classList.remove('aktywna');
                ikona.classList.replace('fa-lock-open', 'fa-lock');
                ikona.style.color = "#444";
            }
        }
        

  /**
   * REJESTRACJA I OBSŁUGA NATYCHMIASTOWEJ AKTUALIZACJI PWA
   * Ten skrypt współpracuje z plikiem service-worker.js
   */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js')
        .then(registration => {
          console.log('[PWA] Service Worker zarejestrowany pomyślnie.');

          // Nasłuchiwanie na pojawienie się nowego pracownika (updatefound)
          registration.addEventListener('updatefound', () => {
            const newWorker = registration.installing;
            console.log('[PWA] Znaleziono nową wersję aplikacji...');

            newWorker.addEventListener('statechange', () => {
              // Sprawdzamy, czy nowy SW zakończył instalację
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[PWA] Nowa zawartość jest gotowa. Odświeżanie...');
                // Opcjonalnie: tutaj można wywołać alert/toast zamiast auto-refresh
                // window.location.reload(); 
              }
            });
          });
        })
        .catch(error => {
          console.error('[PWA] Błąd rejestracji Service Workera:', error);
        });
    });

    // Zmienna zapobiegająca pętli odświeżania
    let refreshing = false;

    // To zdarzenie odpala się, gdy nowy SW przejmuje kontrolę (self.clients.claim())
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) {
        refreshing = true;
        console.log('[PWA] Kontroler zmieniony - przeładowuję stronę dla nowej wersji.');
        window.location.reload();
      }
    });
  }

    </script>
</body>
</html>
