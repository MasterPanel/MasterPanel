<script>
    document.addEventListener('DOMContentLoaded', () => {
        const openCalendarModalBtn = document.getElementById('openCalendarModal');
        const calendarModalOverlay = document.getElementById('calendarModal');
        const currentMonthYearSpan = document.getElementById('currentMonthYear');
        const prevMonthBtn = document.getElementById('prevMonth');
        const nextMonthBtn = document.getElementById('nextMonth');
        const calendarGrid = document.getElementById('calendarGrid');
        const closeModalBtns = document.querySelectorAll('.close-modal-button');

        let currentCalendarDate = new Date();

        const monthNames = [
            "Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec",
            "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"
        ];

        function openModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
                if (modalId === 'calendarModal') {
                    renderCalendar();
                }
            }
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        function renderCalendar() {
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            const today = new Date();

            currentMonthYearSpan.textContent = `${monthNames[month]} ${year}`;

            const firstDayOfMonth = new Date(year, month, 1);
            const lastDayOfMonth = new Date(year, month + 1, 0);
            const daysInMonth = lastDayOfMonth.getDate();

            const startDayOfWeek = (firstDayOfMonth.getDay() === 0) ? 6 : firstDayOfMonth.getDay() - 1;

            calendarGrid.innerHTML = `
                <div class="day-name">Pn</div>
                <div class="day-name">Wt</div>
                <div class="day-name">Śr</div>
                <div class="day-name">Cz</div>
                <div class="day-name">Pt</div>
                <div class="day-name">So</div>
                <div class="day-name">Nd</div>
            `;

            // Poprzedni miesiąc – puste pola
            for (let i = 0; i < startDayOfWeek; i++) {
                const prevMonthDay = new Date(year, month, 0).getDate() - startDayOfWeek + i + 1;
                const div = document.createElement('div');
                div.classList.add('outside-month');
                div.textContent = prevMonthDay;
                calendarGrid.appendChild(div);
            }

            // Dni aktualnego miesiąca
            for (let day = 1; day <= daysInMonth; day++) {
                const div = document.createElement('div');
                div.classList.add('day');
                div.textContent = day;

                if (
                    year === today.getFullYear() &&
                    month === today.getMonth() &&
                    day === today.getDate()
                ) {
                    div.classList.add('current-day');
                }

                calendarGrid.appendChild(div);
            }

            // Uzupełnienie do 42 komórek (6 tygodni)
            const totalCells = startDayOfWeek + daysInMonth;
            const remainingCells = 42 - totalCells;
            for (let i = 1; i <= remainingCells; i++) {
                const div = document.createElement('div');
                div.classList.add('outside-month');
                div.textContent = i;
                calendarGrid.appendChild(div);
            }
        }

        openCalendarModalBtn.addEventListener('click', () => openModal('calendarModal'));

        closeModalBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const modalId = btn.dataset.modal;
                closeModal(modalId);
            });
        });

        prevMonthBtn.addEventListener('click', () => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() - 1);
            renderCalendar();
        });

        nextMonthBtn.addEventListener('click', () => {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + 1);
            renderCalendar();
        });
    });
</script>

  <script>
 
  const apiKey = "b7443c3648481492ff7eb47a9f334466";
  const miasto = "Gubin";
  const weatherIcon = document.querySelector(".weather-icon");
  const desc = document.querySelector(".desc");
  const temp = document.querySelector(".temp");
  const range = document.querySelector(".range");

  function getWeather() {
    fetch(`https://api.openweathermap.org/data/2.5/weather?q=${miasto}&appid=${apiKey}&units=metric&lang=pl`)
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        const main = data.weather[0].main.toLowerCase();
        const description = data.weather[0].description;
        const temperature = Math.round(data.main.temp);
        const tempMin = Math.round(data.main.temp_min);
        const tempMax = Math.round(data.main.temp_max);

        // Wybór emoji na podstawie warunków pogodowych
        let emoji = "🌥️"; // domyślnie częściowo pochmurne 
        if (main.includes("clear")) {
          emoji = "☀️";
        } else if (main.includes("clouds")) {
          emoji = "⛅";
        } else if (main.includes("rain") || main.includes("drizzle")) {
          emoji = "🌧️";
        } else if (main.includes("thunderstorm")) {
          emoji = "⛈️";
        } else if (main.includes("snow")) {
          emoji = "❄️";
        } else if (main.includes("mist") || main.includes("fog") || main.includes("haze")) {
          emoji = "🌫️";
        }

        // Aktualizacja elementów na stronie
        weatherIcon.textContent = emoji;

        temp.textContent = `${temperature}°C`;
        range.textContent = `${tempMax}° / ${tempMin}°`;
      })
      .catch(error => {

      });

const openCalculatorModalBtn = document.getElementById('openCalculatorModal'); // Przycisk otwierający kalkulator
const calculatorModalOverlay = document.getElementById('calculatorModal');     // Nakładka z kalkulatorem (modal)
const calcDisplay = document.getElementById('calcDisplay');                     // Wyświetlacz działania
const calcButtons = calculatorModalOverlay.querySelectorAll('.calculator-buttons button'); // Wszystkie przyciski kalkulatora

// Obsługa otwierania modala kalkulatora
openCalculatorModalBtn.addEventListener('click', () => {
    calculatorModalOverlay.classList.add('active');     // Pokazuje modal
    document.body.style.overflow = 'hidden';            // Blokuje przewijanie tła

// Obsługa zamykania kalkulatora przyciskiem X
calculatorModalOverlay.querySelector('.close-modal-button').addEventListener('click', () => {
    calculatorModalOverlay.classList.remove('active');  // Ukrywa modal
    document.body.style.overflow = '';                  // Odblokowuje przewijanie
});

// Obsługa zamknięcia kliknięciem poza kalkulatorem (na overlay)
calculatorModalOverlay.addEventListener('click', (event) => {
    if (event.target === calculatorModalOverlay) {
        calculatorModalOverlay.classList.remove('active');
        document.body.style.overflow = '';

});

// Zmienne stanu kalkulatora
let currentInput = '0';         // Aktualnie wprowadzana liczba
let operator = null;            // Bieżący operator (+, -, *, / itp.)
let firstOperand = null;        // Pierwsza liczba w działaniu
let waitingForSecondOperand = false; // Czy kalkulator czeka na drugą liczbę
let expression = '';            // Pełne działanie jako tekst

// Aktualizacja wyświetlacza – pokazuje działanie lub bieżącą wartość
function updateDisplay() {
    calcDisplay.textContent = expression || currentInput;
}

// Resetuje wszystkie zmienne i czyści wyświetlacz
function resetCalculator() {
    currentInput = '0';
    operator = null;
    firstOperand = null;
    waitingForSecondOperand = false;
    expression = '';
    updateDisplay();
}

// Obsługa wprowadzania cyfry
function inputDigit(digit) {
    if (waitingForSecondOperand) {
        currentInput = digit;             // Nadpisz bieżący input
        waitingForSecondOperand = false;
    } else {
        currentInput = currentInput === '0' ? digit : currentInput + digit; // Dodaj cyfrę
    }
    expression += digit;                 // Dołącz cyfrę do wyrażenia
    updateDisplay();
}

// Obsługa przecinka dziesiętnego
function inputDecimal(dot) {
    if (!currentInput.includes(dot)) {
        currentInput += dot;             // Dodaj przecinek tylko jeśli nie ma
        expression += dot;               // Dodaj do całego działania
    }
    updateDisplay();
}

// Obsługa operatorów: + - * / = %
function handleOperator(nextOperator) {
    const inputValue = parseFloat(currentInput); // Zamień tekst na liczbę

    if (operator && waitingForSecondOperand) {
        // Jeśli użytkownik zmienia operator (np. z "+" na "-")
        expression = expression.slice(0, -1) + nextOperator; // Zamień ostatni operator
        operator = nextOperator;
        updateDisplay();
        return;
    }

    // Dodaj operator do pełnego wyrażenia
    if (nextOperator !== '=') {
        expression += nextOperator;
    }

    // Jeśli to pierwsza liczba – zapisz jako operand
    if (firstOperand === null) {
        firstOperand = inputValue;
    } else if (operator) {
        // Jeśli jest już pierwszy operand i operator – oblicz wynik
        const result = performCalculation[operator](firstOperand, inputValue);
        currentInput = String(result);    // Zaktualizuj bieżący input
        firstOperand = result;            // Zaktualizuj pierwszy operand
    }

    waitingForSecondOperand = true;       // Czekamy teraz na drugą liczbę
    operator = nextOperator;              // Zapisujemy operator

    // Jeśli wciśnięto "=" – pokaż tylko wynik
    if (nextOperator === '=') {
        expression += ' = ' + currentInput; // Dokończ działanie tekstowo
        expression = currentInput;          // Zresetuj display do samego wyniku
        firstOperand = null;                // Zresetuj stan kalkulatora
        operator = null;
        waitingForSecondOperand = false;
    }

    updateDisplay();
}

// Obiekt z operacjami matematycznymi
const performCalculation = {
    '/': (a, b) => a / b,
    '*': (a, b) => a * b,
    '+': (a, b) => a + b,
    '-': (a, b) => a - b,
    '%': (a, b) => a % b,
    '=': (a, b) => b // przy '=' tylko zwracamy drugą liczbę
};

// Obsługa kliknięć przycisków kalkulatora
calcButtons.forEach(button => {
    const value = button.textContent;

    button.addEventListener('click', () => {
        if (value === 'C') {
            return resetCalculator();        // Wyczyść wszystko
        }
        if (value === '.') {
            return inputDecimal(value);      // Obsłuż przecinek
        }
        if (value === '+/-') {
            // Zmiana znaku liczby
            currentInput = String(-parseFloat(currentInput));
            if (expression.endsWith(currentInput.slice(1))) {
                // Zamień np. "23" na "-23" w wyrażeniu
                expression = expression.slice(0, -currentInput.length + 1) + currentInput;
            } else {
                // Jeśli znak zmieniany przy nowym wprowadzeniu
                expression = currentInput;
            }
            return updateDisplay();
        }
        if (['/', '*', '+', '-', '=', '%'].includes(value)) {
            return handleOperator(value);    // Obsłuż operator
        }

        // Obsługa cyfr
        inputDigit(value);
    });
});
