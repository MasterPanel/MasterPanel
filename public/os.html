<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterCodeViewier - Editor Edition</title>
    <style>
        :root {
            --theme-color: #00f2ff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
        }

        #binaryCanvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .main-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
        }

        @keyframes slideDown {
            0% { travnsform: translateY(-120%); opacity: 0; }
            100% {  transform: translateY(0); opacity: 1; }
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 2.5rem;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            width: 90%;
            max-width: 800px;
            text-align: center;
            animation: slideDown 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
            display: flex;
            flex-direction: column;
            max-height: 85vh;
        }

        h1 {
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 15px var(--theme-color);
            transition: text-shadow 2s ease;
            letter-spacing: 2px;
            font-weight: 800;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.5);
            color: var(--theme-color);
            font-size: 1rem;
            outline: none;
            transition: all 0.4s ease;
            text-align: center;
        }

        .main-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, rgba(255, 255, 255, 0.05) 100%);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
        }

        .main-btn:hover {
            border-color: var(--theme-color);
            box-shadow: 0 0 15px var(--theme-color);
            color: var(--theme-color);
        }

        /* --- STYL EDYTORA --- */
        #editorContainer {
            display: none;
            flex-grow: 1;
            margin-top: 1rem;
            text-align: left;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
        }

        .copy-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 5px 15px;
            border-radius: 6px;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: var(--theme-color);
            color: #000;
            border-color: var(--theme-color);
        }

        #codeEditor {
            width: 100%;
            height: 300px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #d4d4d4;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            transition: border-color 2s ease;
            box-sizing: border-box;
        }

        #codeEditor:focus {
            border-color: var(--theme-color);
        }
    </style>
</head>
<body>

    <canvas id="binaryCanvas"></canvas>

    <div class="main-wrapper">
        <div class="container">
            <h1>MasterCodeViewier</h1>
            
            <input type="text" id="urlInput" placeholder="Wklej adres URL strony..." autofocus>
            <button class="main-btn" onclick="fetchSource()">Przechwyć do edytora</button>

            <div id="editorContainer">
                <div class="editor-header">
                    <label id="editorLabel">Kod źródłowy:</label>
                    <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">Kopiuj Kod</button>
                </div>
                <textarea id="codeEditor" spellcheck="false"></textarea>
            </div>
        </div>
    </div>

    <script>
        // --- LOGIKA KOLORÓW ---
        const colors = ['#00f2ff', '#bc13fe', '#39ff14', '#ff3131', '#ffea00'];
        let currentColor = colors[0];

        function updateColors() {
            let newColor;
            do { newColor = colors[Math.floor(Math.random() * colors.length)]; } while (newColor === currentColor);
            currentColor = newColor;
            document.documentElement.style.setProperty('--theme-color', currentColor);
        }
        setInterval(updateColors, 4000);

        // --- LOGIKA TŁA ---
        const canvas = document.getElementById('binaryCanvas');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const symbols = "..;|.I.:-l,,";
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        const drops = [];
        for (let i = 0; i < columns; i++) { drops[i] = Math.random() * -100; }

        function drawBackground() {
            ctx.fillStyle = "rgba(0, 8, 15, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = currentColor;
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = symbols.charAt(Math.floor(Math.random() * symbols.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawBackground, 33);

        // --- LOGIKA KOPIOWANIA ---
        async function copyToClipboard() {
            const editor = document.getElementById('codeEditor');
            const copyBtn = document.getElementById('copyBtn');
            
            try {
                await navigator.clipboard.writeText(editor.value);
                const originalText = copyBtn.innerText;
                copyBtn.innerText = "Skopiowano!";
                setTimeout(() => {
                    copyBtn.innerText = originalText;
                }, 2000);
            } catch (err) {
                alert("Błąd podczas kopiowania do schowka.");
            }
        }

        // --- LOGIKA POBIERANIA ---
        async function fetchSource() {
            const input = document.getElementById('urlInput');
            const editorContainer = document.getElementById('editorContainer');
            const editor = document.getElementById('codeEditor');
            const label = document.getElementById('editorLabel');
            
            let url = input.value.trim();
            if (!url) { alert('Proszę wkleić link.'); return; }
            if (!url.startsWith('http')) url = 'https://' + url;

            try {
                input.disabled = true;
                input.placeholder = "Pobieranie danych...";

                const response = await fetch(url);
                if (!response.ok) throw new Error('Błąd połączenia');
                
                const htmlText = await response.text();
                
                editor.value = htmlText;
                label.innerText = `Źródło: ${url}`;
                editorContainer.style.display = "block";

            } catch (error) {
                alert('Błąd: ' + error.message + '\nTo narzędzie w przeglądarce podlega restrykcjom CORS.');
            } finally {
                input.disabled = false;
                input.placeholder = "Wklej adres URL strony...";
            }
        }

        document.getElementById('urlInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') fetchSource();
        });
    </script>
</body>
</html>
