<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Retro Dark Paint - Full Suite</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; color: #e0e0e0; }

        .app-container {
            display: flex; flex-direction: column; height: 100vh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .menu-bar {
            background-color: #333; padding: 5px 10px; font-size: 12px;
            border-bottom: 1px solid #444; display: flex; gap: 15px;
        }

        .main-area { display: flex; flex: 1; overflow: hidden; }

        /* Rozbudowany pasek narzędzi */
        .toolbar {
            width: 60px; background-color: #2b2b2b; border-right: 1px solid #444;
            display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 28px;
            gap: 3px; padding: 5px; align-content: start;
        }

        .tool-btn {
            background-color: #3d3d3d; border: 1px solid #555;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; font-size: 14px;
        }

        .tool-btn:active, .tool-btn.active { background-color: #0078d7; border: 1px inset #005a9e; }

        .canvas-container {
            flex: 1; background-color: #444; display: flex;
            align-items: center; justify-content: center; overflow: auto; position: relative;
        }

        canvas { background-color: #ffffff; cursor: crosshair; image-rendering: pixelated; }

        .bottom-bar {
            height: 65px; background-color: #2b2b2b; border-top: 1px solid #444;
            display: flex; align-items: center; padding: 5px 15px; gap: 20px;
        }

        .color-preview { width: 45px; height: 45px; border: 2px inset #555; background-color: #000; flex-shrink: 0; }

        .palette { display: grid; grid-template-columns: repeat(14, 22px); grid-template-rows: repeat(2, 22px); gap: 2px; }

        .color-swatch { width: 22px; height: 22px; border: 1px solid #555; cursor: pointer; }

        .size-selector {
            grid-column: span 2; display: flex; flex-direction: column;
            gap: 4px; padding: 5px; background: #3d3d3d; border: 1px solid #555; margin-top: 5px;
        }

        .size-option { height: 2px; background: #fff; cursor: pointer; border: 2px solid transparent; }
        .size-option.active { border-color: #0078d7; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="menu-bar">
        <span>Plik</span>
        <span onclick="undo()" style="cursor:pointer">Cofnij (Ctrl+Z)</span>
        <span onclick="clearCanvas()" style="cursor:pointer; color: #ff6b6b;">Wyczyść wszystko</span>
    </div>

    <div class="main-area">
        <div class="toolbar" id="toolbar">
            <div class="tool-btn" data-tool="select" title="Zaznacz">✂</div>
            <div class="tool-btn" data-tool="eraser" title="Gumka">⌫</div>
            <div class="tool-btn" data-tool="fill" title="Wiadro">🪣</div>
            <div class="tool-btn" data-tool="picker" title="Zakraplacz">⟴</div>
            <div class="tool-btn" data-tool="zoom" title="Lupa">🔍</div>
            <div class="tool-btn" data-tool="pencil" title="Ołówek" id="defaultTool">✎</div>
            <div class="tool-btn" data-tool="brush" title="Pędzel">🖌</div>
            <div class="tool-btn" data-tool="spray" title="Spray">💨</div>
            <div class="tool-btn" data-tool="text" title="Tekst"><b>A</b></div>
            <div class="tool-btn" data-tool="line" title="Linia">╱</div>
            <div class="tool-btn" data-tool="curve" title="Krzywa">⌇</div>
            <div class="tool-btn" data-tool="rect" title="Prostokąt">▭</div>
            <div class="tool-btn" data-tool="poly" title="Wielokąt">⬡</div>
            <div class="tool-btn" data-tool="ellipse" title="Elipsa">◯</div>

            <div class="size-selector">
                <div class="size-option" data-size="1"></div>
                <div class="size-option active" data-size="3"></div>
                <div class="size-option" data-size="8"></div>
                <div class="size-option" data-size="15"></div>
            </div>
        </div>

        <div class="canvas-container" id="canvasHolder">
            <canvas id="paintCanvas"></canvas>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="color-preview" id="activeColor"></div>
        <div class="palette" id="palette"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('paintCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const toolbar = document.getElementById('toolbar');
    const palette = document.getElementById('palette');
    const activeColorDisplay = document.getElementById('activeColor');

    let painting = false;
    let currentTool = 'pencil';
    let currentColor = '#000000';
    let lineWidth = 3;
    let startX, startY;
    let snapshot; // Do podglądu kształtów
    let history = [];

    const colors = [
        '#000000','#808080','#800000','#808000','#008000','#008080','#000080','#800080','#808040','#004040','#0080ff','#004080','#4000ff','#804000',
        '#ffffff','#c0c0c0','#ff0000','#ffff00','#00ff00','#00ffff','#0000ff','#ff00ff','#ffff80','#00ff80','#80ffff','#8080ff','#ff0080','#ff8040'
    ];

    function initCanvas() {
        canvas.width = 800; // Klasyczna stała szerokość startowa
        canvas.height = 600;
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        saveState();
    }

    function saveState() {
        if (history.length > 20) history.shift();
        history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    }

    function undo() {
        if (history.length > 1) {
            history.pop();
            ctx.putImageData(history[history.length - 1], 0, 0);
        }
    }

    function initPalette() {
        colors.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'color-swatch';
            swatch.style.backgroundColor = color;
            swatch.onclick = () => { currentColor = color; activeColorDisplay.style.backgroundColor = color; };
            palette.appendChild(swatch);
        });
    }

    // Algorytm Flood Fill (Wiadro z farbą)
    function floodFill(startX, startY, fillColor) {
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const startRGB = getPixelRGB(imageData, startX, startY);
        const fillRGB = hexToRgb(fillColor);

        if (rgbMatch(startRGB, fillRGB)) return;

        const pixelStack = [[startX, startY]];
        while (pixelStack.length) {
            let [x, y] = pixelStack.pop();
            let currentColor = getPixelRGB(imageData, x, y);

            if (rgbMatch(currentColor, startRGB)) {
                setPixelRGB(imageData, x, y, fillRGB);
                if (x > 0) pixelStack.push([x - 1, y]);
                if (x < canvas.width - 1) pixelStack.push([x + 1, y]);
                if (y > 0) pixelStack.push([x, y - 1]);
                if (y < canvas.height - 1) pixelStack.push([x, y + 1]);
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }

    function getPixelRGB(imgData, x, y) {
        const index = (y * imgData.width + x) * 4;
        return [imgData.data[index], imgData.data[index+1], imgData.data[index+2]];
    }

    function setPixelRGB(imgData, x, y, rgb) {
        const index = (y * imgData.width + x) * 4;
        imgData.data[index] = rgb[0];
        imgData.data[index+1] = rgb[1];
        imgData.data[index+2] = rgb[2];
        imgData.data[index+3] = 255;
    }

    function hexToRgb(hex) {
        const bigint = parseInt(hex.slice(1), 16);
        return [(bigint >> 16) & 255, (bigint >> 8) & 255, bigint & 255];
    }

    function rgbMatch(a, b) { return a[0] === b[0] && a[1] === b[1] && a[2] === b[2]; }

    // Obsługa myszy
    canvas.addEventListener('mousedown', (e) => {
        painting = true;
        const rect = canvas.getBoundingClientRect();
        startX = e.clientX - rect.left;
        startY = e.clientY - rect.top;
        snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);

        if (currentTool === 'fill') {
            floodFill(Math.floor(startX), Math.floor(startY), currentColor);
            saveState();
            painting = false;
        } else if (currentTool === 'text') {
            const text = prompt("Wpisz tekst:");
            if (text) {
                ctx.fillStyle = currentColor;
                ctx.font = `${lineWidth * 5}px Arial`;
                ctx.fillText(text, startX, startY);
                saveState();
            }
            painting = false;
        } else if (currentTool === 'picker') {
            const pixel = ctx.getImageData(startX, startY, 1, 1).data;
            const hex = "#" + ("000000" + ((pixel[0] << 16) | (pixel[1] << 8) | pixel[2]).toString(16)).slice(-6);
            currentColor = hex;
            activeColorDisplay.style.backgroundColor = hex;
            painting = false;
        }
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!painting) return;
        const rect = canvas.getBoundingClientRect();
        const currX = e.clientX - rect.left;
        const currY = e.clientY - rect.top;

        if (['rect', 'ellipse', 'line'].includes(currentTool)) {
            ctx.putImageData(snapshot, 0, 0);
        }

        ctx.lineWidth = lineWidth;
        ctx.strokeStyle = (currentTool === 'eraser') ? '#ffffff' : currentColor;
        ctx.fillStyle = currentColor;

        switch (currentTool) {
            case 'pencil':
            case 'brush':
            case 'eraser':
                ctx.lineCap = 'round';
                ctx.lineTo(currX, currY);
                ctx.stroke();
                break;
            case 'rect':
                ctx.strokeRect(startX, startY, currX - startX, currY - startY);
                break;
            case 'ellipse':
                ctx.beginPath();
                ctx.ellipse(startX, startY, Math.abs(currX - startX), Math.abs(currY - startY), 0, 0, Math.PI * 2);
                ctx.stroke();
                break;
            case 'line':
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                ctx.lineTo(currX, currY);
                ctx.stroke();
                break;
            case 'spray':
                for (let i = 0; i < 20; i++) {
                    const offset = lineWidth * 2;
                    const rX = currX + (Math.random() - 0.5) * offset;
                    const rY = currY + (Math.random() - 0.5) * offset;
                    ctx.fillRect(rX, rY, 1, 1);
                }
                break;
        }
    });

    canvas.addEventListener('mouseup', () => {
        if (painting) {
            ctx.beginPath();
            saveState();
        }
        painting = false;
    });

    toolbar.addEventListener('click', (e) => {
        const btn = e.target.closest('.tool-btn');
        if (btn) {
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentTool = btn.dataset.tool;
        }
        const size = e.target.closest('.size-option');
        if (size) {
            document.querySelectorAll('.size-option').forEach(s => s.classList.remove('active'));
            size.classList.add('active');
            lineWidth = parseInt(size.dataset.size);
        }
    });

    function clearCanvas() {
        if(confirm("Wyczyścić?")) {
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveState();
        }
    }

    // Skrót Ctrl+Z
    window.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'z') undo();
    });

    initCanvas();
    initPalette();
    document.getElementById('defaultTool').classList.add('active');
</script>
</body>
</html>
