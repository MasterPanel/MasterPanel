<body class="h-screen animate__animated animate__bounceIn" id="body"> <!-- Przeiscia-->
<script>    
  function animateExit(event, targetHref) {
    event.preventDefault();
    const body = document.getElementById('body');

    body.classList.remove('animate__bounceIn');
    void body.offsetWidth; // wymuszenie przeliczenia, by animacja się uruchomiła
    body.classList.add('animate__bounceOut');

    body.addEventListener('animationend', () => {
      window.location.href = targetHref;
    }, { once: true });
  }
    </script>  

<div class="phone-frame">

<br>
  <h2 class="text-4xl">Sterowanie Zasłoną</h2>
<br>
  <div class="window-container" button id="fullscreenBtn">
    <div class="window-header"></div>
    <div class="blind-visual">
      <div class="blind-fill" id="blindFill" style="height: 99.9%;"></div>
    </div>
    <div class="window-parapet"></div>
  </div>

  <div class="control-panel">
    <button onclick="setPosition(0)">Otwórz</button>
    <button onclick="sendCommand('stop')">Zatrzymaj</button>
    <button onclick="setPosition(100)">Zamknij</button>
  </div>

  <div class="slider-panel">
    <p>Ustaw pozycję:</p>
    <input type="range" min="0" max="100" value="50" id="positionSlider" oninput="debouncedUpdatePosition(this.value)">
    <div id="positionDisplay">Pozycja: 50%</div>
  </div>
  <br>

    <div class="flex justify-center mt-4">
      <button onclick="toggleToolbar()" class="text-gray-300 hover:text-white transition animate-bounce">
        <svg id="toggleIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transform transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path id="iconPath" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
    </div>
  <div id="toolbar" class="transition-all duration-300">
      <div class="bg-[#5559] text-white flex justify-around items-center px-6 py-4 rounded-2xl mt-2">
              <!-- Strzałka -->
        <button title="Powrót" onclick="animateExit(event, 'SmartHome.html')">
          <i class="fas fa-undo  text-xl"></i>
        </button>
        <!-- Domek --> 
        <button title="Home"onclick="animateExit(event, 'SmartHome.html')">
    <i  class="fas fa-home text-xl"></i>
        </button>
        <!-- Ustawienia-->
        <button title="Zegar" onclick="animateExit(event, 'Settings.html')">
          <i class="fas fa-cogs text-xl"></i>
        </button>
      </div>
    </div>
  </div>
  <script>
                              
document.getElementById("fullscreenBtn").addEventListener("click", function() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        }
    }
});


    function toggleToolbar() {
      const toolbar = document.getElementById('toolbar');
      const icon = document.getElementById('toggleIcon');
      const iconPath = document.getElementById('iconPath');
      const isOpen = toolbar.classList.contains('max-h-40');

      if (isOpen) {
        toolbar.classList.remove('max-h-40');
        icon.classList.remove('rotate-180');
        iconPath.setAttribute("d", "M19 9l-7 7-7-7");
      } else {
        toolbar.classList.add('max-h-40');
        icon.classList.add('rotate-180');
        iconPath.setAttribute("d", "M19 15l-7-7-7 7");
      }
    }

    function updateClockAndDate() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, "0");
      const minutes = now.getMinutes().toString().padStart(2, "0");
      // Sprawdzamy, czy elementy istnieją przed próbą ustawienia innerText
      const hoursElement = document.getElementById("hours");
      const minutesElement = document.getElementById("minutes");
      const dateElement = document.getElementById("date");

      if (hoursElement) hoursElement.innerText = hours;
      if (minutesElement) minutesElement.innerText = minutes;

      if (dateElement) {
        const dni = ["niedz.", "pon.", "wt.", "śr.", "czw.", "pt.", "sob."];
        const mies = ["sty", "lut", "mar", "kwi", "maj", "cze", "lip", "sie", "wrz", "paź", "lis", "gru"];
        const dzien = dni[now.getDay()];
        const miesiac = mies[now.getMonth()];
        const data = `${dzien} ${miesiac} ${now.getDate()}`;
        dateElement.innerText = data;
      }
    }

    setInterval(updateClockAndDate, 1000);
    updateClockAndDate();

    let locked = false;

    function toggleLock() {
      const iconContainer = document.getElementById("lockIcon");
      if (locked) {
        iconContainer.innerHTML = `

          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11V6a3 3 0 00-6 0m-4 5h14a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2z" />
          </svg>
        `;
      } else {
        iconContainer.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c1.104 0 2 .896 2 2v1H10v-1c0-1.104.896-2 2-2z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 11V8a5 5 0 00-10 0v3M5 11h14a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2z" />
          </svg>
        `;
      }
      locked = !locked;
    }


    // Nowe funkcje dla opóźnienia suwaka
    let timeoutId;
    const DELAY_MS = 300; // Opóźnienie w milisekundach

    function sendCommand(cmd) {
      console.log("Wysyłanie polecenia:", cmd);
      // fetch(`/api/roleta?cmd=${cmd}`);
    }

    function setPosition(value) {
      document.getElementById('positionSlider').value = value;
      // Natychmiastowa aktualizacja wizualizacji przycisków "Otwórz"/"Zamknij"
      updatePositionVisual(value);
      // Wysyłanie komendy z opóźnieniem, jakby z suwaka
      debouncedUpdatePosition(value);
    }

    // Funkcja aktualizująca tylko wyświetlacz tekstu i wizualizację rolety
    function updatePositionVisual(value) {
        const position = parseInt(value);
        document.getElementById('positionDisplay').innerText = `Pozycja: ${position}%`;
        document.getElementById('blindFill').style.width = `${position}%`;
    }

    // Funkcja, która opóźnia wysłanie komendy i aktualizację wizualizacji
    function debouncedUpdatePosition(value) {
      clearTimeout(timeoutId); // Wyczyść poprzednie opóźnienie
      
      // Aktualizuj tekst pozycji od razu podczas przesuwania suwaka
      document.getElementById('positionDisplay').innerText = `Pozycja: ${parseInt(value)}%`;

      timeoutId = setTimeout(() => {
        const position = parseInt(value);
        updatePositionVisual(position); // Aktualizuj wizualizację po opóźnieniu
        console.log(`Wysyłanie pozycji do serwera: ${position}%`);
        // fetch(`/api/pozycja?value=${position}`); // Odkomentuj to, gdy będziesz mieć backend
      }, DELAY_MS);
    }

    // Dodano do CSS: transition: width 0.5s ease-out; do .blind-fill
  </script>
</body>
