name: Build Android APK

on:
  push:
    branches: [ main, master ] # Uruchom przy wypchnięciu na te gałęzie

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: |
          mkdir -p www
          # Jeśli masz skrypt budujący (np. Vite/Webpack), użyj go tutaj. 
          # Jeśli nie, upewnij się, że index.html jest w folderze www.

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MasterPanel-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
