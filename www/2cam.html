<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dwa Iframe obok siebie</title>
    <style>
        /* === RESET I PODSTAWOWE STYLE === */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Ukrycie suwaków strony głównej */
        }

        /* === KONTENER FLEXBOX === */
        .container {
            display: flex; /* Ustawienie elementów w rzędzie */
            width: 100%;
            height: 100vh;
        }

        /* === STYLIZACJA IFRMAE === */
        .container iframe {
            width: 100%;     /* Każdy iframe zajmuje połowę szerokości */
            height: 100vh;  /* Pełna wysokość okna przeglądarki */
            border: none;   /* Usunięcie domyślnych ramek */
        }
    </style>
</head>
<body>

    <div class="container">
        <iframe src="http://192.168.1.26:8080/browserfs.html"></iframe>
    </div>   

</body>
</html>
