<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Pinout</title>

<style>

/* =====================================================
GLOBAL STYLE
===================================================== */

body{
background:#0f172a;
color:BLACK;
font-family:system-ui;
margin:0;
}

/* =====================================================
LAYOUT (RESPONSYWNY)
===================================================== */

.container{
display:grid;
grid-template-columns: 1fr 1fr;
min-height:100vh;
}

/* tryb telefon */

@media(max-width:900px){
    .container{
    grid-template-columns:1fr;
    grid-template-rows:auto auto;
    }
}

/* =====================================================
BOARD AREA
===================================================== */

.boardArea{
display:flex;
justify-content:center;
align-items:center;
background:#020617;
padding:20px;
}

.board{
width:30%;
max-width:300px;
aspect-ratio:1/1.6;
background:#1e3a8a;
border-radius:14px;
position:relative;
box-shadow:0 0 40px rgba(0,0,0,0.7);
}

/* chip */
.usb{
width:40%;
aspect-ratio:1/1;
background:#777;
position:absolute;
top:80%;
left:30%;
border-radius:6px;
}
.chip{
width:50%;
color:WHITE;
aspect-ratio:1/1;
background:#111;
position:absolute;
top:30%;
left:25%;
transform:rotate(45deg);
border-radius:6px;
display: flex;
align-items: center;
justify-content: center;
font-size: 10px;
text-align: center;
}

/* --- PIN CONTAINERS --- */

.leftPins, .rightPins {
    position: absolute;
    display: flex;
    flex-direction: column;
    justify-content: space-between; 
    height: 85%; 
    top: 7.5%;  
}

.leftPins { left: -20px; }
.rightPins { right: -20px; }

/* --- PIN STYLES --- */

.pin, .pinblack, .pintxrx, .pinred {
    width: 30px;
    height: 12px;
    border-radius: 2px;
    cursor: pointer;
    transition: 0.2s;
    position: relative;
    border: 1px solid #475569;
}

.pin { background: #FFD941; }
.pinblack { color:WHITE; background: #000; border-color: #111; }
.pintxrx { background: #fff; border-color: #999; }
.pinred { background: #911; border-color: #911; }

/* Hover states */
.pin:hover { background: #333; transform: scale(1.1); }
.pinred:hover { background: #f00; transform: scale(1.1); }
.pinblack:hover { background: #111; transform: scale(1.1); }
.pintxrx:hover { background: #f00; transform: scale(1.1); }

/* Active states */
.activePin { background: #994 !important; box-shadow: 0 0 15px #994; }
.activepinblack { background: #38bdf8 !important; box-shadow: 0 0 15px #38bdf8; }
.activePinred { background: #f00 !important; box-shadow: 0 0 15px #f00; }
.activepintxrx { background: #994 !important; box-shadow: 0 0 15px #994; }

/* Labels dla pinów */
.pin::after, .pinred::after, .pinblack::after, .pintxrx::after {
    content: attr(data-pin);
    position: absolute;
    font-size: 11px;
    top: 50%;
    transform: translateY(-50%);
}

.pin-labels {
    position: absolute;
    left: 40px;
    top: 0;
    display: flex;
    gap: 2px;
    pointer-events: none;
    z-index: 10;
}
.leftPins .pin-labels { left: auto; right: 40px; }

.mini-badge {
    font-size: 8px;
    padding: 1px 3px;
    border-radius: 2px;
    color: white;
}

/* =====================================================
INFO AREA
===================================================== */

.infoArea{
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

h1{ margin:0; font-size:32px; color:#38bdf8; }
.desc{ color:#94a3b8; margin-top:10px; line-height:1.6; }

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-top:30px;
border:1px solid #334155;
min-height: 150px;
color: white;
}

#componentView {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 15px;
    min-height: 110px;
}

.badge{
display:inline-block;
padding:4px 10px;
border-radius:6px;
font-size:11px;
font-weight:bold;
margin-right:5px;
margin-bottom:5px;
text-transform:uppercase;
border: none;
cursor: pointer;
color: white;
}

/* kolory funkcji */
.SPI{ background:#ef4444; }
.I2C{ background:#f59e0b; }
.ADC{ background:#10b981; }
.PWM{ background:#ec4899; }
.UART{ background:#06b6d4; }
.POWER{ background:#ef4444; }
.GND{ background:#475569; }
.DHT11{ background:#3b82f6; }
.RELAY{ background:#f97316; }
.SERVO{ background:#6366f1; }
.MOSFET{ background:#64748b; }

/* =====================================================
COMPONENT VISUALIZATIONS
===================================================== */

/* DHT11 */
.v-dht11 { display: flex; flex-direction: column; align-items: center; }
.v-dht11-body { width: 45px; height: 60px; background: #3b82f6; border-radius: 4px; display: flex; flex-direction: column; align-items: center; padding-top: 5px; }
.v-dht11-grid { width: 35px; height: 40px; background-image: linear-gradient(to right, #001 1px, transparent 1px), linear-gradient(to bottom, #001 1px, transparent 1px); background-size: 6px 6px; border: 1px solid #001; }
.v-dht11-pins { display: flex; gap: 6px; margin-top: 5px; }
.v-dht11-pin { width: 3px; height: 12px; background: #111; }

/* RELAY */
.v-relay { display: flex; flex-direction: column; align-items: center; }
.v-relay-top { width: 50px; height: 20px; background: #00f; border-radius: 4px 4px 0 0; display: flex; justify-content: space-around; align-items: center; }
.v-relay-screw { width: 8px; height: 8px; background: #999; border-radius: 50%; }
.v-relay-body { width: 50px; height: 45px; background: #000080; }
.v-relay-pins { display: flex; gap: 8px; margin-top: 2px; }
.v-relay-pin { width: 2px; height: 12px; }

/* SERVO */
.v-servo { width: 60px; height: 90px; background: #111; border-radius: 4px; position: relative; display: flex; justify-content: center; }
.v-servo-arm { width: 22px; height: 55px; background: #777; border-radius: 11px; position: absolute; top: 10px; transform: rotate(-30deg); display: flex; flex-direction: column; align-items: center; gap: 6px; padding-top: 6px; }
.v-servo-hole { width: 4px; height: 4px; background: #111; border-radius: 50%; }
.v-servo-axis { width: 14px; height: 14px; background: #eee; border-radius: 50%; position: absolute; bottom: 6px; }

/* TRANZ (NEW) */
.v-tranz { display: flex; flex-direction: column; align-items: center; }
.v-tranz-tab { width: 30px; height: 15px; background: #94a3b8; border-radius: 2px 2px 0 0; position: relative; display: flex; justify-content: center; }
.v-tranz-hole { width: 8px; height: 8px; background: #fff; border-radius: 50%; margin-top: 3px; }
.v-tranz-body { width: 30px; height: 25px; background: #000; }
.v-tranz-legs { display: flex; gap: 6px; }
.v-tranz-leg { width: 3px; height: 40px; background: #94a3b8; }

</style>
</head>
<body>

<div class="container">

    <div class="boardArea">
        <div class="board">  
            <div class="usb"></div>  
            <div class="chip">ESP32-S3</div>
            
            <div class="leftPins">
                <div class="pin" data-pin="pin7"><div class="pin-labels"></div></div>
                <div class="pin" data-pin="pin8"><div class="pin-labels"></div></div>
                <div class="pin" data-pin="pin9"><div class="pin-labels"></div></div>
                <div class="pin" data-pin="pin10"><div class="pin-labels"></div></div>
                <div class="pin" data-pin="pin11"><div class="pin-labels"></div></div>
                <div class="pin" data-pin="pin12"><div class="pin-labels"></div></div>
                <div class="pin" data-pin="pin13"><div class="pin-labels"></div></div>
                <div class="pintxrx" data-pin="RX"><div class="pin-labels"></div></div>
                <div class="pintxrx" data-pin="TX"><div class="pin-labels"></div></div>
            </div>

            <div class="rightPins">
                <div class="pin" data-pin="pin6"><div class="pin-labels"></div></div>
                <div class="pin" data-pin="pin5"><div class="pin-labels"></div></div>
                <div class="pin" data-pin="pin4"><div class="pin-labels"></div></div>
                <div class="pin" data-pin="pin3"><div class="pin-labels"></div></div>
                <div class="pin" data-pin="pin2"><div class="pin-labels"></div></div>
                <div class="pin" data-pin="pin1"><div class="pin-labels"></div></div>
                <div class="pinred" data-pin="+3.3V"><div class="pin-labels"></div></div>
                <div class="pinblack" data-pin="GND"><div class="pin-labels"></div></div>
                <div class="pinred" data-pin="+5V"><div class="pin-labels"></div></div>
            </div>
        </div>
    </div>

    <div class="infoArea">
        <h1>ESP32 s3 Zero</h1>
        <p class="desc"></p>
        
        <div>
            <button class="badge SPI" onclick="filterPins('SPI')">SPI</button>
            <button class="badge I2C" onclick="filterPins('I2C')">I2C</button>
            <button class="badge ADC" onclick="filterPins('ADC')">ADC</button>
            <button class="badge PWM" onclick="filterPins('PWM')">PWM</button>
            <button class="badge UART" onclick="filterPins('UART')">UART</button>
        </div>

        <div class="card">
            <div id="componentView"></div>
            <h3 id="pinTitle">Wybierz pin...</h3>
            <div id="pinFunctions"></div>
        </div>
    </div>

</div>

<script>
/* =====================================================
DANE PINÓW
===================================================== */

const pinsData = {
    "pin1": ["SPI", "I2C","ADC", "PWM","UART"],
    "pin2": ["SPI", "I2C","ADC", "PWM","UART"],
    "pin3": ["SPI", "I2C","ADC", "PWM","UART"],
    "pin4": ["DHT11", "ADC"],
    "pin5": ["SERVO", "PWM"],
    "pin6": ["MOSFET", "PWM"],
    "pin7": ["RELAY", "PWM"],
    "pin8": ["SPI", "I2C","ADC", "PWM","UART"],
    "pin9": ["SPI", "I2C","ADC", "PWM","UART"],
    "pin10": ["SPI", "I2C","ADC", "PWM","UART"],
    "pin11": ["SPI", "I2C","ADC", "PWM","UART"],
    "pin12": ["SPI", "I2C","ADC", "PWM","UART"],
    "pin13": ["SPI", "I2C","ADC", "PWM","UART"],
    "RX": ["UART"],
    "TX": ["UART"],
    "+3.3V": ["POWER"],
    "+5V": ["POWER"],
    "GND": ["GND"]
};

/* =====================================================
LOGIKA KLIKNIĘCIA
===================================================== */

document.querySelectorAll(".pin, .pinred, .pinblack, .pintxrx").forEach(pin => {
    pin.addEventListener("click", () => {
        document.querySelectorAll(".pin, .pinred, .pinblack, .pintxrx").forEach(p => {
            p.classList.remove("activePin", "activepinblack", "activePinred", "activepintxrx");
        });
        
        if(pin.classList.contains('pin')) pin.classList.add("activePin");
        if(pin.classList.contains('pinblack')) pin.classList.add("activepinblack");
        if(pin.classList.contains('pinred')) pin.classList.add("activePinred");
        if(pin.classList.contains('pintxrx')) pin.classList.add("activepintxrx");
        
        const pinName = pin.dataset.pin;
        const functions = pinsData[pinName] || [];
        
        updateSidePanel(pinName, functions);
        
        const labelContainer = pin.querySelector('.pin-labels');
        if (labelContainer) {
            labelContainer.innerHTML = "";
            functions.forEach(f => {
                const span = document.createElement("span");
                span.className = `mini-badge ${f}`;
                span.innerText = f;
                labelContainer.appendChild(span);
            });
        }
    });
});

/* =====================================================
FUNKCJE POMOCNICZE
===================================================== */

function updateSidePanel(name, functions) {
    document.getElementById("pinTitle").innerText = name;
    const container = document.getElementById("pinFunctions");
    const view = document.getElementById("componentView");
    container.innerHTML = "";
    view.innerHTML = "";
    
    if (functions.length === 0) {
        container.innerHTML = '<span style="color:#64748b">Brak danych</span>';
        return;
    }
    
    functions.forEach(f => {
        const el = document.createElement("span");
        el.className = "badge " + f;
        el.innerText = f;
        container.appendChild(el);

        if(f === "DHT11") {
            view.innerHTML = `
                <div class="v-dht11">
                    <div class="v-dht11-body"><div class="v-dht11-grid"></div></div>
                    <div class="v-dht11-pins"><div class="v-dht11-pin"></div><div class="v-dht11-pin"></div><div class="v-dht11-pin"></div></div>
                </div>`;
        }
        if(f === "RELAY") {
            view.innerHTML = `
                <div class="v-relay">
                    <div class="v-relay-top"><div class="v-relay-screw"></div><div class="v-relay-screw"></div><div class="v-relay-screw"></div></div>
                    <div class="v-relay-body"></div>
                    <div class="v-relay-pins">
                        <div class="v-relay-pin" style="background:yellow"></div>
                        <div class="v-relay-pin" style="background:red"></div>
                        <div class="v-relay-pin" style="background:green"></div>
                    </div>
                </div>`;
        }
        if(f === "SERVO") {
            view.innerHTML = `
                <div class="v-servo">
                    <div class="v-servo-arm">
                        <div class="v-servo-hole"></div><div class="v-servo-hole"></div><div class="v-servo-hole"></div>
                        <div class="v-servo-axis"></div>
                    </div>
                </div>`;
        }
        if(f === "MOSFET") {
            view.innerHTML = `
                <div class="v-tranz">
                    <div class="v-tranz-tab"><div class="v-tranz-hole"></div></div>
                    <div class="v-tranz-body"></div>
                    <div class="v-tranz-legs">
                        <div class="v-tranz-leg"></div><div class="v-tranz-leg"></div><div class="v-tranz-leg"></div>
                    </div>
                </div>`;
        }
    });
}

function filterPins(type) {
    document.querySelectorAll(".pin-labels").forEach(l => l.innerHTML = "");
    Object.keys(pinsData).forEach(pinName => {
        if (pinsData[pinName].includes(type)) {
            const pinEl = document.querySelector(`[data-pin="${pinName}"]`);
            if (pinEl) {
                const span = document.createElement("span");
                span.className = `mini-badge ${type}`;
                span.innerText = type;
                pinEl.querySelector('.pin-labels').appendChild(span);
            }
        }
    });
}

</script>
</body>
</html>
