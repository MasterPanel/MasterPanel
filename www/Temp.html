<script>
  // Zmienne globalne
  let currentRoom = 'salon';
  
  // Tablica zawierająca nazwy wszystkich pokojów zdefiniowanych w HTML
  const ROOM_HTML_IDS = ['salon', 'sypialnia', 'lazienka', 'lena']; 
  const BASE_URL = "https://masterpanell.vercel.app/api/dht";

  // Funkcja zmiany pokoju z animacją (pozostaje bez zmian)
  function showRoom(roomId, animationType, buttonElement) {
    const allRooms = document.querySelectorAll('.room');
    allRooms.forEach(room => {
      room.classList.remove('active');
    });
    const allButtons = document.querySelectorAll('nav button');
    allButtons.forEach(btn => {
      btn.classList.remove('active');
    });
    buttonElement.classList.add('active');
    setTimeout(() => {
      const targetRoom = document.getElementById(roomId);
      if (targetRoom) {
        targetRoom.classList.add('active');
        currentRoom = roomId;
      }
    }, 100);
  }

  // Funkcja ustawiająca postęp dla wskaźników kołowych (pozostaje bez zmian)
  function setProgress(id, value) {
    const circle = document.getElementById(id);
    if (!circle) return;
    const radius = 70;
    const circumference = 2 * Math.PI * radius;
    const offset = circumference - (value / 100) * circumference;
    circle.style.strokeDashoffset = offset;
  }

  /**
   * NOWA FUNKCJA: Aktualizuje wskaźniki kołowe (Sypialnia, Łazienka).
   * @param {string} roomId - ID pokoju ('sypialnia' lub 'lazienka').
   * @param {number} temp - Wartość temperatury.
   * @param {number} hum - Wartość wilgotności.
   */
  function updateCircleDisplays(roomId, temp, hum) {
      // Określenie sufiksu ID (brak dla 'sypialnia', 'Lazienka' dla 'lazienka')
      const suffix = roomId === 'sypialnia' ? '' : 'Lazienka';

      const tempLabel = document.getElementById(`tempLabel${suffix}`);
      const humLabel = document.getElementById(`humLabel${suffix}`);
      
      if (tempLabel) tempLabel.innerText = temp.toFixed(1) + "°C";
      if (humLabel) humLabel.innerText = hum.toFixed(1) + "%";
      
      // TEMP: Skalowanie do zakresu koła (np. 0°C = 0%, 40°C = 100%)
      const tempProgress = (temp / 40) * 100;
      setProgress(`tempCircle${suffix}`, tempProgress);
      
      // HUM: Skalowanie do zakresu koła (0% = 0%, 100% = 100%)
      setProgress(`humCircle${suffix}`, hum);
  }

  /**
   * NOWA FUNKCJA: Aktualizuje paski (Salon, Lena).
   * @param {string} roomId - ID pokoju ('salon' lub 'lena').
   * @param {number} temp - Wartość temperatury.
   * @param {number} hum - Wartość wilgotności.
   */
  function updateBarDisplays(roomId, temp, hum) {
    // Określenie sufiksu ID (brak dla 'salon', 'Lena' dla 'lena')
    const suffix = roomId === 'salon' ? '' : 'Lena';

    const tempBar = document.getElementById(`tempBar${suffix}`);
    const tempValue = document.getElementById(`tempValue${suffix}`);
    const humBar = document.getElementById(`humBar${suffix}`);
    const humValue = document.getElementById(`humValue${suffix}`);

    // TEMP: Skalowanie paska do zakresu (np. 0-50°C)
    if (tempBar && tempValue) {
      const tempPercent = (temp / 50) * 100; 
      tempBar.style.height = `${Math.min(Math.max(tempPercent, 0), 100)}%`;
      tempValue.textContent = temp.toFixed(1);
    }
    
    // HUM: Skalowanie paska do zakresu (0-100%)
    if (humBar && humValue) {
      const humPercent = hum; 
      humBar.style.height = `${Math.min(Math.max(humPercent, 0), 100)}%`;
      humValue.textContent = hum.toFixed(1);
    }
  }
  
  // ZMODYFIKOWANA GŁÓWNA FUNKCJA POBIERANIA DANYCH
  async function fetchData() {
    try {
      const response = await fetch(BASE_URL);
      if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
      
      // Serwer zwraca obiekt JSON z danymi dla wszystkich pokoi
      const allData = await response.json(); 
      
      // Iteracja po wszystkich pokojach i aktualizacja ich wskaźników
      ROOM_HTML_IDS.forEach(roomHtmlId => {
        const roomJsonKey = roomHtmlId; // Nazwa pokoju jest kluczem w JSON
        const roomData = allData[roomJsonKey];

        // Używamy tylko danych, które istnieją i są poprawne
        if (roomData) {
            const temp = parseFloat(roomData.temp);
            const hum = parseFloat(roomData.hum);

            if (!isNaN(temp) && !isNaN(hum)) {
                // Pokój używający wskaźników kołowych
                if (['sypialnia', 'lazienka'].includes(roomHtmlId)) {
                  updateCircleDisplays(roomHtmlId, temp, hum);
                } 
                // Pokój używający pasków
                else if (['salon', 'lena'].includes(roomHtmlId)) {
                  updateBarDisplays(roomHtmlId, temp, hum);
                }
            }
        }
      });
      
    } catch (error) {
      console.error('Błąd pobierania danych:', error);
    }
  }

  // Pogoda (pozostaje bez zmian)
  const apiKey = "b7443c3648481492ff7eb47a9f334466";
  const miasto = "Gubin";
  const weatherIcon = document.querySelector(".weather-icon");
  const desc = document.querySelector(".desc");
  const temp = document.querySelector(".temp");
  const range = document.querySelector(".range");

  function getWeather() {
    fetch(`https://api.openweathermap.org/data/2.5/weather?q=${miasto}&appid=${apiKey}&units=metric&lang=pl`)
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.json();
      })
      .then(data => {
        const main = data.weather[0].main.toLowerCase();
        const description = data.weather[0].description;
        const temperature = Math.round(data.main.temp);
        const tempMin = Math.round(data.main.temp_min);
        const tempMax = Math.round(data.main.temp_max);

        let emoji = "🌥️";
        if (main.includes("clear")) {
          emoji = "☀️";
        } else if (main.includes("clouds")) {
          emoji = "⛅";
        } else if (main.includes("rain") || main.includes("drizzle")) {
          emoji = "🌧️";
        } else if (main.includes("thunderstorm")) {
          emoji = "⛈️";
        } else if (main.includes("snow")) {
          emoji = "❄️";
        } else if (main.includes("mist") || main.includes("fog") || main.includes("haze")) {
          emoji = "🌫️";
        }

        weatherIcon.textContent = emoji;
        desc.textContent = description.charAt(0).toUpperCase() + description.slice(1);
        temp.textContent = `${temperature}°C`;
        range.textContent = `${tempMax}° / ${tempMin}°`;
      })
      .catch(error => {
        console.error("Błąd pobierania pogody:", error);
      });
  }

  // Fullscreen (pozostaje bez zmian)
  document.getElementById("fullscreenBtn").addEventListener("click", function() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      if (document.exitFullscreen) {
        document.exitFullscreen();
      }
    }
  });

  // Toolbar (pozostaje bez zmian)
  function toggleToolbar() {
    const toolbar = document.getElementById("toolbar");
    const icon = document.getElementById("toggleIcon");
    const iconPath = document.getElementById("iconPath");
    const isOpen = toolbar.classList.contains("max-h-40");

    if (isOpen) {
      toolbar.classList.remove("max-h-40");
      icon.classList.remove("rotate-180");
      iconPath.setAttribute("d", "M19 9l-7 7-7-7");
    } else {
      toolbar.classList.add("max-h-40");
      icon.classList.add("rotate-180");
      iconPath.setAttribute("d", "M19 15l-7-7-7 7");
    }
  }

  // Zegar (pozostaje bez zmian)
  function updateClockAndDate() {
    const now = new Date();
    const hours = now.getHours().toString().padStart(2, "0");
    const minutes = now.getMinutes().toString().padStart(2, "0");
    document.getElementById("hours").innerText = hours;
    document.getElementById("minutes").innerText = minutes;

    const dni = ["niedz.", "pon.", "wt.", "śr.", "czw.", "pt.", "sob."];
    const mies = ["sty", "lut", "mar", "kwi", "maj", "cze", "lip", "sie", "wrz", "paź", "lis", "gru"];
    const data = `${dni[now.getDay()]} ${mies[now.getMonth()]} ${now.getDate()}`;
    document.getElementById("date").innerText = data;
  }
  
  function animateExit(event) {
    event.preventDefault();
    const link = event.currentTarget.href;
    const body = document.getElementById('body');
    body.classList.remove('animate__bounceIn');
    body.classList.add('animate__bounceOut');
    setTimeout(() => {
      window.location.href = link;
    }, 700);
  }

  // Uruchomienie wszystkich funkcji
  setInterval(updateClockAndDate, 1000);
  updateClockAndDate();

  setInterval(getWeather, 30 * 60 * 1000);
  getWeather();

  setInterval(fetchData, 5000);
  fetchData();
</script>

</body>
</html>
