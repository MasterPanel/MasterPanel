
<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />

    <title>Baza Danych</title>
    <style>
        /* Podstawowe ustawienia tła i fontów */
        body {
            user-select: none;
            margin: 0;
            background: #000;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Główny kontener udający okno aplikacji */
        .explorer-window {
            width: 100%;
         
            height: 100%;
            background-color: rgba(25, 25, 25, 0.95);
            border: 1px solid #444;
            border-radius: 0px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        /* Górny pasek narzędziowy z formularzem */
        .toolbar {
             width: 100%;
            padding: 15px 20px;
            background: #222;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .toolbar h1 {
            width: 50%;
            margin: 0;
            font-size: 18px;
            color: #fff;
            margin-right: 20px;
            white-space: nowrap;
        }

        #uploadForm {
            display: flex;

            gap: 20px;
            flex-grow: 1;
        }

        input[type="file"] {
            background: #333;
           

            color: #ccc;
            border: 1px solid #444;
            padding: 5px;
            border-radius: 4px;
            flex-grow: 1;
        }

        button {
            padding: 9px 40px;
            background-color: #111;
            color: white;
            border: none;
            border-radius: 4px;
                        margin-right: 60px;

            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #000;
          
        }

        /* Główna sekcja robocza */
        .main-container {
            display: flex;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Pasek boczny nawigacji */
        .sidebar {
            width: 180px;
            background: rgba(30, 30, 30, 0.5);
            border-right: 1px solid #333;
            padding: 10px 0;
        }

        .sidebar-item {
            padding: 8px 20px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }

        .sidebar-item:hover {
            background:#0001;
        }

        .sidebar-item.active {
    background:#0005;            color: #fff;
            border-left: 3px solid #0078d4;
        }

        /* Widok plików (siatka/grid) */
        .content-view {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            grid-auto-rows: max-content;
            gap: 20px;
            align-content: start;
        }

        /* Styl pojedynczej ikony pliku */
        .file-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 10px;
            border-radius: 4px;
            transition: background 0.2s;
            text-decoration: none;
            color: #ddd;
            cursor: pointer;
        }

        .file-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .file-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 8px;
            background: #444;
            position: relative;
            border-radius: 4px;
        }

        /* Prosta grafika ikony pliku w CSS */
        .file-icon::after {
            content: "";
            position: absolute;
            top: 0; right: 0;
            width: 15px; height: 15px;
            background: #555;
            clip-path: polygon(0 0, 100% 100%, 0 100%);
        }

        .file-name {
            font-size: 12px;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Komunikaty statusu */
        #message {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }

        .success { display: block !important; background-color: #2e7d32; color: #fff; }
        .error { display: block !important; background-color: #c62828; color: #fff; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        /* Ikona folderu */
.fas.fa-folder-plus {
  font-size: 2em; /* Zwiększ rozmiar ikony folderu (np. 2em) */
  animation: pulse 1.5s infinite; /* Dodaj animację pulsowania (wyjaśniona poniżej) */
}

/* Ikony strzałek */
.fas.fa-random {
  animation: slide-right 2s infinite; /* Dodaj animację przesuwania w prawo (wyjaśniona poniżej) */
}

/* Animacja pulsowania */
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

/* Animacja przesuwania w prawo */
@keyframes slide-right {
  0% { transform: translateX(-10px); }
  100% { transform: translateX(10px); }
}
    </style>
</head>
<body>
    <div class="explorer-window">
        <div class="toolbar">
    <i class="fas fa-folder-plus"></i><i class="fas fa-random"></i>
            <form id="uploadForm" enctype="multipart/form-data">
                <input type="file" name="myFile" id="myFile" required>
                <button type="submit">Prześlij</button>
            </form>
        </div>

        <div class="main-container">
            <div class="sidebar">
                <div class="sidebar-item active"><span><i class="fas fa-cloud"></i></span>Katalog Główny</div>
               <div class="sidebar-item "><span><i class="fas fa-folder"></i></span>
                   Folder Wspólny</div>
           
            </div>

            <div class="content-view" id="fileList">
                </div>
        </div>
    </div>

    <div id="message"></div>

    <script>
        const uploadForm = document.getElementById('uploadForm');
        const myFileInput = document.getElementById('myFile');
        const messageDiv = document.getElementById('message');
        const fileListContainer = document.getElementById('fileList');

        // Funkcja wyświetlania komunikatów
        function showMessage(text, isSuccess) {
            messageDiv.textContent = text;
            messageDiv.className = isSuccess ? 'success' : 'error';
            messageDiv.style.display = 'block';
            setTimeout(() => { messageDiv.style.display = 'none'; }, 3000);
        }

        // Obsługa formularza przesyłania plików
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!myFileInput.files.length) {
                showMessage('Proszę wybrać plik.', false);
                return;
            }

            const formData = new FormData();
            formData.append('myFile', myFileInput.files[0]);

            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                const text = await response.text();
                showMessage(text, response.ok);
                myFileInput.value = '';
                loadFiles();
            } catch (error) {
                console.error('Błąd przesyłania:', error);
                showMessage('Błąd połączenia z serwerem.', false);
            }
        });

        // Funkcja do ładowania i wyświetlania plików w formie ikon
        async function loadFiles() {
            try {
                const response = await fetch('/files');
                if (!response.ok) {
                    throw new Error(`Błąd serwera: ${response.status}`);
                }
                const files = await response.json();
                fileListContainer.innerHTML = '';

                if (files.length === 0) {
                    fileListContainer.innerHTML = '<div style="color: #666; grid-column: 1/-1;">Folder jest pusty.</div>';
                } else {
                    files.forEach(file => {
                        // Tworzenie elementu pliku
                        const fileLink = document.createElement('a');
                        fileLink.href = `/files/${file}`;
                        fileLink.className = 'file-item';
                        fileLink.download = file;
                        fileLink.title = file;

                        fileLink.innerHTML = `
                            <div class="file-icon"></div>
                            <div class="file-name">${file}</div>
                        `;
                        
                        fileListContainer.appendChild(fileLink);
                    });
                }
            } catch (error) {
                console.error('Błąd ładowania listy plików:', error);
                fileListContainer.innerHTML = '<div style="color: #ff4444; grid-column: 1/-1;">Nie udało się załadować plików.</div>';
            }
        }

        // Inicjalizacja przy ładowaniu strony
        document.addEventListener('DOMContentLoaded', loadFiles);
    </script>
</body>
</html>
